    // ---------- Coloured hexdump ----------
    const raw = el("div");
    const toolbar = el("div", {class:"toolbar"});
    const search = el("input", {type:"search", id:"hexSearch", placeholder:"Search (highlights ASCII + UTF-16LE)…"});
    const chk = el("label", {class:"toggle"}, [
      el("input", {type:"checkbox", id:"hexHit"}),
      el("span", {class:"small"}, ["Highlight hits"])
    ]);
    const headBtn = el("button", {id:"viewHead"}, ["Head"]);
    const tailBtn = el("button", {id:"viewTail"}, ["Tail"]);
    const focusBtn = el("button", {id:"viewFocus", disabled:true}, ["Focus"]);
    const clearSelBtn = el("button", {id:"clearSel"}, ["Clear selection"]);
    const plusBtn = el("button", {id:"moreBytes"}, ["More bytes"]);
    const minusBtn = el("button", {id:"lessBytes"}, ["Fewer bytes"]);

    toolbar.appendChild(search);
    toolbar.appendChild(chk);
    toolbar.appendChild(headBtn);
    toolbar.appendChild(tailBtn);
    toolbar.appendChild(focusBtn);
    toolbar.appendChild(clearSelBtn);
    toolbar.appendChild(minusBtn);
    toolbar.appendChild(plusBtn);
    raw.appendChild(toolbar);

    const hexBox = el("div", {id:"hexBox"});
    raw.appendChild(hexBox);

    const rawDetails = sectionDetails("Coloured hexdump", "Search hits (yellow), selected ranges (cyan), hovered field (purple), drag-to-select bytes, right-click to copy", raw, "rawDetails");
    $out.appendChild(rawDetails);

    document.getElementById("hexHit").checked = true;

    let view = "head";
    let focusStart = 0;
    let bytesToShow = 8192;
    let selectedRange = null;
    let hoverRange = null;
    let anchorAbs = null;

    let dragOn = false;
    let dragAnchor = null;

    const HEX_GROUP = 16;
    const HEX_ROW_HEIGHT = 18;
    const HEX_OVERSCAN_ROWS = 12;
    let virtualState = null;
    let virtualScrollRaf = 0;
    let selectionInfoEl = null;

    function setSelectedFromTwo(a, b, label="Selection") {
      const lo = Math.min(a,b), hi = Math.max(a,b);
      selectedRange = { startAbs: lo, endAbs: hi+1, label };
      anchorAbs = dragAnchor;
    }

    function selectionInfoNode() {
      const line = el("div", {class:"small muted", style:"margin-bottom:8px"});
      if (!selectedRange) { line.textContent = "Selected: none (drag in hex, or right-click a byte)"; return line; }
      const len = selectedRange.endAbs - selectedRange.startAbs;
      line.textContent = `Selected: ${selectedRange.label || "range"} ${hex(selectedRange.startAbs)}–${hex(selectedRange.endAbs)} (len ${len}) — right-click to copy`;
      return line;
    }

    let rafPending = false;
    let rafLast = 0;
    function updateSelectionInfo() {
      if (!selectionInfoEl?.isConnected) return;
      const next = selectionInfoNode();
      selectionInfoEl.replaceWith(next);
      selectionInfoEl = next;
    }

    function scheduleRefresh(_preserveScroll=true) {
      if (menuOpen) return; // do not repaint while the context menu is open
      const now = performance.now();
      if (rafPending) return;
      if (now - rafLast < 16) return;
      rafPending = true;
      requestAnimationFrame(() => {
        rafPending = false;
        rafLast = performance.now();
        updateSelectionInfo();
        renderVirtualRows(true);
      });
    }

    function clampTip(x, y) {
      const pad = 12;
      const w = tip.offsetWidth || 260;
      const h = tip.offsetHeight || 60;
      const nx = Math.min(window.innerWidth - w - pad, x + 14);
      const ny = Math.min(window.innerHeight - h - pad, y + 14);
      return { x: Math.max(pad, nx), y: Math.max(pad, ny) };
    }

    function showTip(text, clientX, clientY) {
      tip.textContent = text;
      tip.style.display = "block";
      const pos = clampTip(clientX, clientY);
      tip.style.left = pos.x + "px";
      tip.style.top = pos.y + "px";
    }

    function hideTip() { tip.style.display = "none"; }

    function currentViewRange() {
      if (view === "head") {
        const len = Math.min(bytesToShow, parsed._bytes.length);
        return { start: 0, len, label: `File head (first ${len} bytes):` };
      }

      if (view === "tail") {
        const start = Math.max(0, parsed._bytes.length - bytesToShow);
        const len = Math.min(bytesToShow, parsed._bytes.length - start);
        return { start, len, label: `File tail (last ${len} bytes):` };
      }

      const start = Math.max(0, Math.min(focusStart, Math.max(0, parsed._bytes.length - 1)));
      const len = Math.min(bytesToShow, Math.max(0, parsed._bytes.length - start));
      return { start, len, label: `Focus view @ ${hex(start)} (showing ${len} bytes):` };
    }

    function scrollContentTop(node, scroller) {
      const nodeRect = node.getBoundingClientRect();
      const scrollerRect = scroller.getBoundingClientRect();
      return (nodeRect.top - scrollerRect.top) + scroller.scrollTop;
    }

    function renderVirtualRows(force=false, ensureRow=null) {
      const state = virtualState;
      if (!state?.hexNode?.isConnected || !state.canvas?.isConnected) return;

      const canvasTop = scrollContentTop(state.canvas, hexBox);
      const visibleTop = Math.max(0, hexBox.scrollTop - canvasTop);
      const viewportHeight = Math.max(HEX_ROW_HEIGHT, hexBox.clientHeight || 500);
      let firstVisibleRow = Math.floor(visibleTop / HEX_ROW_HEIGHT);
      const visibleRows = Math.ceil(viewportHeight / HEX_ROW_HEIGHT);
      const lastPossibleRow = Math.max(0, state.totalRows - 1);

      firstVisibleRow = Math.max(0, Math.min(lastPossibleRow, firstVisibleRow));
      if (Number.isFinite(ensureRow)) {
        firstVisibleRow = Math.max(0, Math.min(lastPossibleRow, Math.trunc(ensureRow)));
      }

      const firstRow = Math.max(0, firstVisibleRow - HEX_OVERSCAN_ROWS);
      const lastRow = Math.min(state.totalRows, firstVisibleRow + visibleRows + HEX_OVERSCAN_ROWS);

      if (!force && firstRow === state.firstRow && lastRow === state.lastRow) return;
      state.firstRow = firstRow;
      state.lastRow = lastRow;

      state.rowsHost.style.transform = `translateY(${firstRow * HEX_ROW_HEIGHT}px)`;
      state.rowsHost.innerHTML = "";

      const rowStartAbs = state.start + firstRow * HEX_GROUP;
      const rowEndAbs = Math.min(state.end, state.start + lastRow * HEX_GROUP);
      appendHexRows(state.rowsHost, parsed._bytes, rowStartAbs, rowEndAbs - rowStartAbs, {
        group: HEX_GROUP,
        search: state.needle,
        highlightHits: state.highlight,
        selectedRange,
        hoverRange,
        anchorAbs,
        hitMap: state.hitMap,
        hitMapStart: state.start
      });
    }

    function scheduleVirtualRows(force=false) {
      if (virtualScrollRaf) return;
      virtualScrollRaf = requestAnimationFrame(() => {
        virtualScrollRaf = 0;
        renderVirtualRows(force);
      });
    }

    function refreshHex(scrollPreserve=true) {
      const prevScroll = hexBox.scrollTop;
      hexBox.innerHTML = "";
      virtualState = null;

      const needle = search.value || "";
      const highlight = document.getElementById("hexHit").checked;
      const range = currentViewRange();

      focusBtn.disabled = view !== "focus";
      selectionInfoEl = selectionInfoNode();
      hexBox.appendChild(selectionInfoEl);
      hexBox.appendChild(el("div", {class:"small muted"}, [range.label]));

      const hexNode = el("div", {class:"hex", id:"hexRendered"});
      const canvas = el("div", {class:"hx-virtual-canvas"});
      const rowsHost = el("div", {class:"hx-virtual-rows"});
      canvas.appendChild(rowsHost);
      hexNode.appendChild(canvas);
      hexBox.appendChild(hexNode);
      attachHexSelectionAndHoverHandlers(hexNode);

      const end = Math.min(parsed._bytes.length, range.start + range.len);
      const totalRows = Math.ceil(Math.max(0, end - range.start) / HEX_GROUP);
      canvas.style.height = `${totalRows * HEX_ROW_HEIGHT}px`;
      virtualState = {
        start: range.start,
        end,
        totalRows,
        firstRow: -1,
        lastRow: -1,
        needle,
        highlight,
        hitMap: highlight ? buildHitMap(parsed._bytes, range.start, end, needle) : new Uint8Array(Math.max(0, end - range.start)),
        hexNode,
        canvas,
        rowsHost
      };

      if (scrollPreserve) hexBox.scrollTop = prevScroll;
      else hexBox.scrollTop = 0;
      renderVirtualRows(true);
    }

    async function scrollToOffset(absOffset, isCurrent = null) {
      const state = virtualState;
      if (!state || state.end <= state.start) return false;
      const stillCurrent = () => typeof isCurrent !== "function" || isCurrent();
      if (!stillCurrent()) return false;

      const numericOffset = Number(absOffset);
      if (!Number.isFinite(numericOffset)) return false;

      const clamped = Math.max(state.start, Math.min(state.end - 1, Math.trunc(numericOffset)));
      const row = Math.floor((clamped - state.start) / HEX_GROUP);
      const viewportHeight = Math.max(HEX_ROW_HEIGHT, hexBox.clientHeight || 500);
      const centrePad = Math.max(40, (viewportHeight - HEX_ROW_HEIGHT) / 2);

      // Recalculate after each frame because opening <details>, moving the page and
      // replacing virtual rows can all alter the content origin.
      for (let attempt = 0; attempt < 4; attempt++) {
        if (!stillCurrent() || virtualState !== state || !state.hexNode.isConnected) return false;

        const canvasTop = scrollContentTop(state.canvas, hexBox);
        const target = canvasTop + row * HEX_ROW_HEIGHT - centrePad;
        hexBox.scrollTop = Math.max(0, target);
        renderVirtualRows(true, row);
        await nextLayoutFrame();
        if (!stillCurrent()) return false;

        const byteNode = state.rowsHost.querySelector(`.hx-b[data-abs="${clamped}"]`);
        if (!byteNode) continue;

        const boxRect = hexBox.getBoundingClientRect();
        const byteRect = byteNode.getBoundingClientRect();
        const desiredY = boxRect.top + (boxRect.height / 2);
        const delta = byteRect.top - desiredY;

        if (Math.abs(delta) > HEX_ROW_HEIGHT) {
          hexBox.scrollTop = Math.max(0, hexBox.scrollTop + delta);
          renderVirtualRows(true, row);
          await nextLayoutFrame();
          if (!stillCurrent()) return false;
        }

        return Boolean(state.rowsHost.querySelector(`.hx-b[data-abs="${clamped}"]`));
      }

      return false;
    }

    function setView(mode, start=0, preserveScroll=true) {
      view = mode;
      if (mode === "focus") focusStart = start;
      refreshHex(preserveScroll);
    }

    headBtn.addEventListener("click", () => { hexJumpSequence++; setView("head", 0); });
    tailBtn.addEventListener("click", () => { hexJumpSequence++; setView("tail", 0); });
    focusBtn.addEventListener("click", () => { hexJumpSequence++; setView("focus", focusStart); });
    plusBtn.addEventListener("click", () => { bytesToShow = Math.min(65536, bytesToShow * 2); refreshHex(); });
    minusBtn.addEventListener("click", () => { bytesToShow = Math.max(2048, Math.floor(bytesToShow / 2)); refreshHex(); });

    search.addEventListener("input", () => { hexJumpSequence++; selectedRange = null; anchorAbs = null; hoverRange = null; closeMenu(); refreshHex(); });
    document.getElementById("hexHit").addEventListener("change", () => { closeMenu(); refreshHex(); });
    clearSelBtn.addEventListener("click", () => { selectedRange = null; anchorAbs = null; hoverRange = null; closeMenu(); refreshHex(); });
    hexBox.addEventListener("scroll", () => scheduleVirtualRows(false), { passive: true });

    function attachHexSelectionAndHoverHandlers(hexNode) {
      const getAbsFromTarget = (t) => {
        if (!t || !t.dataset) return null;
        const s = t.dataset.abs;
        if (!s) return null;
        const n = Number(s);
        return Number.isFinite(n) ? n : null;
      };

      const updateHover = (abs, clientX, clientY) => {
        const best = mostSpecificFieldCovering(knownRanges, abs);
        const section = topLevelSectionForOffset(parsed, abs) || "(unknown)";

        const nextHover = best
          ? { startAbs: best.start, endAbs: best.end, label: best.name }
          : null;

        const changed = (!hoverRange && nextHover) ||
                        (hoverRange && !nextHover) ||
                        (hoverRange && nextHover &&
                          (hoverRange.startAbs !== nextHover.startAbs ||
                           hoverRange.endAbs !== nextHover.endAbs ||
                           hoverRange.label !== nextHover.label));

        hoverRange = nextHover;

        if (best) {
          const len = best.end - best.start;
          const text = [
            `Offset: ${hex(abs)}`,
            `Section: ${section}`,
            `Field: ${best.name}`,
            `Range: ${hex(best.start)} +${len}`
          ].join("\n");
          showTip(text, clientX, clientY);
        } else {
          const text = [
            `Offset: ${hex(abs)}`,
            `Section: ${section}`,
            `Field: (none)`
          ].join("\n");
          showTip(text, clientX, clientY);
        }

        if (changed) scheduleRefresh(false);
      };

      const onDown = (e) => {
        if (e.button === 2) return;
        closeMenu();
        const abs = getAbsFromTarget(e.target);
        if (abs === null) return;
        e.preventDefault();

        dragOn = true;
        dragAnchor = abs;
        anchorAbs = abs;
        setSelectedFromTwo(abs, abs, "Selection");
        scheduleRefresh(true);
      };

      const onOver = (e) => {
        const abs = getAbsFromTarget(e.target);
        if (abs === null) return;

        updateHover(abs, e.clientX, e.clientY);

        if (!dragOn) return;
        setSelectedFromTwo(dragAnchor, abs, "Selection");
        scheduleRefresh(false);
      };

      const onMove = (e) => {
        const abs = getAbsFromTarget(e.target);
        if (abs === null) return;
        updateHover(abs, e.clientX, e.clientY);
      };

      const onLeave = () => {
        hoverRange = null;
        hideTip();
        // dont close the menu on leaving the hex region
        scheduleRefresh(false);
      };

      const onContextMenu = (e) => {
        const abs = getAbsFromTarget(e.target);
        if (abs === null) return;

        e.preventDefault();
        e.stopPropagation();

        // stop any drag and hide tooltip; keep selection if present
        dragOn = false;
        hideTip();

        const u8 = parsed._bytes;

        let startAbs, endAbs, label;

        const hasSelection =
          selectedRange &&
          Number.isFinite(selectedRange.startAbs) &&
          Number.isFinite(selectedRange.endAbs) &&
          selectedRange.endAbs > selectedRange.startAbs;

        if (hasSelection) {
          startAbs = selectedRange.startAbs;
          endAbs = selectedRange.endAbs;
          label = selectedRange.label || "Selection";
        } else {
          startAbs = abs;
          endAbs = Math.min(u8.length, abs + 1);
          label = "Byte";
          selectedRange = { startAbs, endAbs, label };
          anchorAbs = abs;
          scheduleRefresh(false);
        }

        const title = `${label}: ${hex(startAbs)}–${hex(endAbs)} (${endAbs - startAbs} bytes)`;

        openMenu(e.clientX, e.clientY, [
          { label: "Copy hexdump (offset + hex + ASCII)", getText: () => formatCopyPayload(u8, startAbs, endAbs, "hexdump") },
          { label: "Copy hex bytes (AA BB CC)",          getText: () => formatCopyPayload(u8, startAbs, endAbs, "hex") },
          { label: "Copy C style (\\xAA\\xBB...)",       getText: () => formatCopyPayload(u8, startAbs, endAbs, "c") },
          "sep",
          { label: "Cancel", getText: () => "" }
        ], title);
      };

      hexNode.addEventListener("mousedown", onDown);
      hexNode.addEventListener("mouseover", onOver);
      hexNode.addEventListener("mousemove", onMove);
      hexNode.addEventListener("mouseleave", onLeave);
      hexNode.addEventListener("contextmenu", onContextMenu);

      if (!__hexGlobalListenersInstalled) {
        __hexGlobalListenersInstalled = true;

        window.addEventListener("mouseup", () => { dragOn = false; }, { passive: true });

        window.addEventListener("mouseleave", () => {
          hoverRange = null;
          hideTip();
          closeMenu();
          scheduleRefresh(false);
        }, { passive: true });

        window.addEventListener("click", closeMenu, { passive: true });
        window.addEventListener("scroll", closeMenu, { passive: true, capture: true });
        window.addEventListener("keydown", (e) => { if (e.key === "Escape") closeMenu(); }, { passive: true });
      }
    }

    hexUI = {
      details: rawDetails,
      searchInput: search,
      hexBox,
      setView,
      refresh: refreshHex,
      setSelectedRange: (r) => { selectedRange = r; },
      setHoverRange: (r) => { hoverRange = r; },
      setAnchorAbs: (a) => { anchorAbs = a; },
      scrollToOffset,
    };

    refreshHex();
  }

  async function loadFile(file) {
    lastName = file?.name || "shortcut.lnk";
    if ($fileNameHint) $fileNameHint.textContent = lastName;
    $status.textContent = `${lastName} (${file.size.toLocaleString()} bytes)`;
    const buf = await file.arrayBuffer();
    const parsed = parseLnk(buf);
    lastParsed = parsed;
    setAlerts(parsed);
    render(parsed);
    $copyJson.disabled = false;
    $downloadJson.disabled = false;
  }

  $file.addEventListener("change", async () => {
    if ($file.files && $file.files[0]) await loadFile($file.files[0]);
  });

  $drop.addEventListener("dragover", (e) => { e.preventDefault(); $drop.classList.add("drag"); });
  $drop.addEventListener("dragleave", () => $drop.classList.remove("drag"));
  $drop.addEventListener("drop", async (e) => {
    e.preventDefault();
    $drop.classList.remove("drag");
    const f = e.dataTransfer.files?.[0];
    if (f) await loadFile(f);
  });

  $copyJson.addEventListener("click", async () => {
    if (!lastParsed) return;
    const clone = JSON.parse(JSON.stringify(lastParsed));
    delete clone._bytes;
    const txt = JSON.stringify(clone, null, 2);
    await navigator.clipboard.writeText(txt);
    $status.textContent = `Copied JSON for ${lastName}`;
  });

  $downloadJson.addEventListener("click", () => {
    if (!lastParsed) return;
    const clone = JSON.parse(JSON.stringify(lastParsed));
    delete clone._bytes;
    const txt = JSON.stringify(clone, null, 2);
    const blob = new Blob([txt], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${lastName}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

})();
</script>
</body>
</html>
