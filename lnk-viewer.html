    const end = Math.min(hardEnd, off + maxBytes, u8.length);
    let p = off;
    while (p + 1 < end) {
      if (u8[p] === 0x00 && u8[p + 1] === 0x00) break;
      p += 2;
    }
    const bytes = u8.slice(off, p);
    return new TextDecoder("utf-16le", { fatal: false }).decode(bytes);
  }

  function findAsciiNeedle(u8, needle) {
    if (!needle) return -1;
    const n = needle.toLowerCase();
    if (n.length < 2) return -1;

    const nb = new TextEncoder().encode(n);

    const proj = new Uint8Array(u8.length);
    for (let i=0;i<u8.length;i++) {
      const b = u8[i];
      proj[i] = (b>=0x41 && b<=0x5A) ? (b+0x20) : b;
    }

    for (let i=0;i+nb.length<=proj.length;i++) {
      let ok = true;
      for (let j=0;j<nb.length;j++) if (proj[i+j] !== nb[j]) { ok=false; break; }
      if (ok) return i;
    }
    return -1;
  }

  function findNeedle(u8, needle) {
    const ascii = findAsciiNeedle(u8, needle);
    if (ascii >= 0) return { pos: ascii, mode: "ASCII" };
    const u16 = findUtf16leNeedle(u8, needle);
    if (u16 >= 0) return { pos: u16, mode: "UTF-16LE" };
    return { pos: -1, mode: null };
  }

  function buildHitMap(u8, start, end, needle) {
    const len = end - start;
    const hitMap = new Uint8Array(len);
    const n = (needle || "").toLowerCase();
    if (n.length < 2) return hitMap;

    // ASCII
    {
      const nb = new TextEncoder().encode(n);
      const proj = new Uint8Array(len);
      for (let i=0;i<len;i++) {
        const b = u8[start+i];
        proj[i] = (b>=0x41 && b<=0x5A) ? (b+0x20) : b;
      }
      for (let i=0;i+nb.length<=len;i++) {
        let ok = true;
        for (let j=0;j<nb.length;j++) if (proj[i+j] !== nb[j]) { ok=false; break; }
        if (ok) for (let j=0;j<nb.length;j++) hitMap[i+j] = 1;
      }
    }

    // UTF-16LE
    {
      const nb = encodeUtf16le(n);
      const proj = new Uint8Array(len);
      for (let i=0;i<len;i++) proj[i] = u8[start+i];
      for (let i=0;i+1<len;i++) {
        if (proj[i+1] === 0x00 && proj[i] >= 0x41 && proj[i] <= 0x5A) proj[i] = proj[i] + 0x20;
      }
      for (let i=0;i+nb.length<=len;i++) {
        let ok = true;
        for (let j=0;j<nb.length;j++) if (proj[i+j] !== nb[j]) { ok=false; break; }
        if (ok) for (let j=0;j<nb.length;j++) hitMap[i+j] = 1;
      }
    }

    return hitMap;
  }

  // ---------- Heuristic: extract printable UTF-16LE strings from a byte range ----------
  function carveUtf16leStrings(u8, start, end, minChars=6) {
    const out = [];
    let i = start;
    while (i+1 < end) {
      let j = i;
      while (j+1 < end) {
        const lo = u8[j], hi = u8[j+1];
        if (hi !== 0x00) break;
        if (lo < 0x20 || lo > 0x7E) break;
        j += 2;
      }
      const chars = (j - i) / 2;
      if (chars >= minChars) {
        const s = new TextDecoder("utf-16le",{fatal:false}).decode(u8.slice(i, j));
        if (s && !out.includes(s)) out.push(s);
        i = j + 2;
      } else {
        i += 2;
      }
    }
    return out.slice(0, 30);
  }

  // ---------- Coloured hex renderer ----------
  function appendHexRows(wrap, u8, absStart, len, opts = {}) {
    const group = opts.group ?? 16;
    const start = Math.max(0, absStart);
    const end = Math.min(u8.length, start + Math.max(0, len));

    const needle = (opts.search || "");
    const highlightHits = opts.highlightHits ?? true;
    const selectedRange = opts.selectedRange || null;
    const hoverRange = opts.hoverRange || null;
    const anchorAbs = opts.anchorAbs ?? null;

    const hitMapStart = Number.isFinite(opts.hitMapStart) ? opts.hitMapStart : start;
    const hitMap = opts.hitMap || (
      highlightHits
        ? buildHitMap(u8, start, end, needle)
        : new Uint8Array(Math.max(0, end - start))
    );

    const isHitAt = (absPos) => {
      if (!highlightHits) return false;
      const rel = absPos - hitMapStart;
      return rel >= 0 && rel < hitMap.length && hitMap[rel] === 1;
    };

    for (let i = start; i < end; i += group) {
      const lineStart = i;
      const lineEnd = Math.min(end, i + group);

      const lineNode = el("span", {class:"hx-line"});
      lineNode.dataset.rowAbs = String(lineStart);
      lineNode.appendChild(el("span", {class:"hx-off"}, [(lineStart).toString(16).toUpperCase().padStart(8,"0")]));

      const hexCol = el("span", {class:"hx-hex"});
      for (let j=0;j<group;j++) {
        if (j && j % 8 === 0) hexCol.appendChild(document.createTextNode(" "));
        if (lineStart + j >= lineEnd) {
          hexCol.appendChild(document.createTextNode("   "));
          continue;
        }

        const absPos = lineStart + j;
        const b = u8[absPos];

        const isHit = isHitAt(absPos);
        const isSel = selectedRange && absPos >= selectedRange.startAbs && absPos < selectedRange.endAbs;
        const isHov = hoverRange && absPos >= hoverRange.startAbs && absPos < hoverRange.endAbs;
        const isAnchor = anchorAbs !== null && absPos === anchorAbs;

        const cls = ["hx-b"];
        if (b === 0x00) cls.push("null");
        const printable = (b >= 0x20 && b < 0x7F);
        if (printable) cls.push("print");
        const pathish = printable && ("\/:._-".includes(String.fromCharCode(b)) ||
          (b>=0x30 && b<=0x39) || (b>=0x41 && b<=0x5A) || (b>=0x61 && b<=0x7A));
        if (pathish) cls.push("path");
        if (isHit) cls.push("hit");
        if (isHov) cls.push("hov");
        if (isSel) cls.push("sel");
        if (isAnchor) cls.push("anchor");

        const byteNode = el("span", {class: cls.join(" ")}, [b2(b)]);
        byteNode.dataset.abs = String(absPos);
        hexCol.appendChild(byteNode);
        hexCol.appendChild(document.createTextNode(" "));
      }
      lineNode.appendChild(hexCol);

      lineNode.appendChild(el("span", {class:"hx-gap"}, [" "]));
      lineNode.appendChild(document.createTextNode("|"));
      const asciiCol = el("span", {class:"hx-ascii"});
      for (let j=0;j<group;j++) {
        if (lineStart + j >= lineEnd) break;
        const absPos = lineStart + j;
        const b = u8[absPos];

        const isHit = isHitAt(absPos);
        const isSel = selectedRange && absPos >= selectedRange.startAbs && absPos < selectedRange.endAbs;
        const isHov = hoverRange && absPos >= hoverRange.startAbs && absPos < hoverRange.endAbs;

        const printable = (b >= 0x20 && b < 0x7F);
        const ch = printable ? String.fromCharCode(b) : ".";
        const cls = ["hx-a"];
        if (!printable) cls.push("dim");
        if (isHit) cls.push("hit");
        if (isHov) cls.push("hov");
        if (isSel) cls.push("sel");
        const aNode = el("span", {class: cls.join(" ")}, [ch]);
        aNode.dataset.abs = String(absPos);
        asciiCol.appendChild(aNode);
      }
      lineNode.appendChild(asciiCol);
      lineNode.appendChild(document.createTextNode("|"));

      wrap.appendChild(lineNode);
    }

    return wrap;
  }

  function renderHexColour(u8, absStart, len, opts = {}) {
    const maxBytes = opts.maxBytes ?? len;
    const start = Math.max(0, absStart);
    const end = Math.min(u8.length, start + Math.min(len, maxBytes));
    const wrap = el("div", {class:"hex", id: opts.hexId || ""});
    return appendHexRows(wrap, u8, start, end - start, opts);
  }

  // ---------- Parse ItemIDList (simple) ----------
  function parseItemIDList(u8, absStart, byteLen) {
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
    const items = [];
    let p = absStart;
    const end = Math.min(u8.length, absStart + byteLen);
    let guard = 0;

    while (p + 2 <= end && guard++ < 10000) {
      const size = dv.getUint16(p, true);
      if (size === 0) { items.push({ kind: "TERMINATOR", absOffset: p, size: 2 }); p += 2; break; }
      if (size < 2) { items.push({ kind: "INVALID", absOffset: p, size, note: "Item size < 2; stopping." }); break; }
      const itemEnd = p + size;
      if (itemEnd > end) { items.push({ kind: "TRUNCATED", absOffset: p, size, note: "Item extends beyond IDList size; stopping." }); break; }

      const data = u8.slice(p + 2, itemEnd);
      const typeByte = data.length ? data[0] : null;
      let hint = "Shell item (unknown)";
      if (typeByte !== null) {
        if ((typeByte & 0x70) === 0x20) hint = "File entry (common)";
        else if ((typeByte & 0x70) === 0x30) hint = "Folder entry (common)";
        else if ((typeByte & 0x70) === 0x40) hint = "Volume / root (common)";
        else if ((typeByte & 0x70) === 0x50) hint = "Network / share (common)";
      }

      items.push({
        kind: "ITEM",
        absOffset: p,
        size,
        typeByte: typeByte === null ? null : ("0x" + typeByte.toString(16).toUpperCase().padStart(2, "0")),
        hint,
        dataAbsStart: p + 2,
        dataLen: size - 2
      });
      p = itemEnd;
    }

    return { items, parsedBytes: p - absStart, end };
  }

  // ---------- ExtraData parsing (key blocks) ----------
  const EXTRA_SIG = {
    EnvironmentVariableDataBlock: 0xA0000001,
    ConsoleDataBlock:             0xA0000002,
    TrackerDataBlock:             0xA0000003,
    ConsoleFEDataBlock:           0xA0000004,
    SpecialFolderDataBlock:       0xA0000005,
    DarwinDataBlock:              0xA0000006,
    IconEnvironmentDataBlock:     0xA0000007,
    ShimDataBlock:                0xA0000008,
    PropertyStoreDataBlock:       0xA0000009,
    KnownFolderDataBlock:         0xA000000B,
    VistaAndAboveIDListDataBlock: 0xA000000C
  };

  function extraSigName(sig) {
    for (const [k,v] of Object.entries(EXTRA_SIG)) if ((sig>>>0) === (v>>>0)) return k;
    return null;
  }

  function parseExtraBlock(u8, absStart, absEnd) {
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
    if (absStart + 8 > absEnd) return { parsed: null };

    const blockSize = dv.getUint32(absStart, true);
    const sig = dv.getUint32(absStart+4, true);
    const type = extraSigName(sig) || "UnknownExtraDataBlock";
    const meta = {};
    const out = { type, signature: hex(sig), blockSize, absStart, absEnd, parsed: null, meta, notes: [], carvedUtf16: [] };

    meta._block = { absOff: absStart, len: Math.max(1, absEnd - absStart) };

    try {
      if (sig === EXTRA_SIG.EnvironmentVariableDataBlock) {
        const ansiOff = absStart + 8;
        const uniOff = absStart + 8 + 260;
        const ansiLen = 260, uniLen = 520;
        const tAnsi = readFixedAnsi(u8, ansiOff, Math.min(ansiLen, absEnd - ansiOff));
        const tUni = (uniOff + 2 <= absEnd)
          ? new TextDecoder("utf-16le",{fatal:false}).decode(u8.slice(uniOff, Math.min(absEnd, uniOff + uniLen))).replace(/\u0000+$/g,"")
          : null;

        out.parsed = { targetAnsi: tAnsi || null, targetUnicode: tUni || null };

        // Link displayed targets to their actual string bytes rather than the
        // entire fixed-width fields, making target-to-hex navigation precise.
        const ansiRange = ansiStringRange(u8, ansiOff, Math.min(absEnd, ansiOff + ansiLen));
        const unicodeRange = utf16leStringRange(u8, uniOff, Math.min(absEnd, uniOff + uniLen));
        meta.targetAnsi = { absOff: ansiOff, len: Math.max(1, ansiRange.len) };
        meta.targetUnicode = { absOff: uniOff, len: Math.max(2, unicodeRange.len) };
      }
      else if (sig === EXTRA_SIG.TrackerDataBlock) {
        const lengthOff = absStart + 8;
        const versionOff = absStart + 12;
        const machineOff = absStart + 16;
        const droidOff = absStart + 32;
        const droidBirthOff = absStart + 64;

        const len = (lengthOff + 4 <= absEnd) ? dv.getUint32(lengthOff, true) : null;
        const ver = (versionOff + 4 <= absEnd) ? dv.getUint32(versionOff, true) : null;
        const machine = (machineOff + 16 <= absEnd) ? readFixedAnsi(u8, machineOff, 16) : null;

        const droid1 = (droidOff + 16 <= absEnd) ? readGuid(u8, droidOff) : null;
        const droid2 = (droidOff + 32 <= absEnd) ? readGuid(u8, droidOff+16) : null;

        const birth1 = (droidBirthOff + 16 <= absEnd) ? readGuid(u8, droidBirthOff) : null;
        const birth2 = (droidBirthOff + 32 <= absEnd) ? readGuid(u8, droidBirthOff+16) : null;

        const droid = [droid1, droid2].filter(Boolean);
        const droidBirth = [birth1, birth2].filter(Boolean);
        const trackerMacInfo = extractTrackerMacInfo(droid, droidBirth);

        out.parsed = {
          length: len,
          version: ver,
          machineID: machine || null,
          macAddresses: trackerMacInfo.macAddresses,
          macAddressDetails: trackerMacInfo.macAddressDetails,
          uuidV1Nodes: trackerMacInfo.uuidV1Nodes,
          droid,
          droidBirth,
        };

        if (trackerMacInfo.uuidV1Nodes.some(x => x.isMulticastNode)) {
          out.notes.push("One or more UUID v1 node identifiers have the multicast bit set, so they are shown as UUID nodes but not reported as physical MAC-address candidates.");
        }

        meta.length = { absOff: lengthOff, len: 4 };
        meta.version = { absOff: versionOff, len: 4 };
        meta.machineID = { absOff: machineOff, len: Math.min(16, absEnd - machineOff) };
        meta.droid = { absOff: droidOff, len: Math.min(32, absEnd - droidOff) };
        meta.droidBirth = { absOff: droidBirthOff, len: Math.min(32, absEnd - droidBirthOff) };
        if (droid1) {
          meta.droid0 = { absOff: droidOff, len: 16 };
          meta.droid0Node = { absOff: droidOff + 10, len: 6 };
        }
        if (droid2) {
          meta.droid1 = { absOff: droidOff + 16, len: 16 };
          meta.droid1Node = { absOff: droidOff + 26, len: 6 };
        }
        if (birth1) {
          meta.droidBirth0 = { absOff: droidBirthOff, len: 16 };
          meta.droidBirth0Node = { absOff: droidBirthOff + 10, len: 6 };
        }
        if (birth2) {
          meta.droidBirth1 = { absOff: droidBirthOff + 16, len: 16 };
          meta.droidBirth1Node = { absOff: droidBirthOff + 26, len: 6 };
        }
      }
      else if (sig === EXTRA_SIG.ConsoleDataBlock) {
        const expectedSize = 0xCC;
        if (blockSize !== expectedSize) {
          out.notes.push(`Invalid ConsoleDataBlock size: ${hex(blockSize)}; expected 0x000000CC.`);
        }

        const fillOff = absStart + 8;
        const popupFillOff = absStart + 10;
        const sbxOff = absStart + 12;
        const sbyOff = absStart + 14;
        const wxOff = absStart + 16;
        const wyOff = absStart + 18;
        const windowOriginXOff = absStart + 20;
        const windowOriginYOff = absStart + 22;
        const fontSizeOff = absStart + 32;
        const fontFamilyOff = absStart + 36;
        const fontWeightOff = absStart + 40;
        const faceNameOff = absStart + 44;
        const cursorOff = absStart + 108;
        const fullScreenOff = absStart + 112;
        const quickEditOff = absStart + 116;
        const insertModeOff = absStart + 120;
        const autoPositionOff = absStart + 124;
        const historyBufferSizeOff = absStart + 128;
        const numberOfHistoryBuffersOff = absStart + 132;
        const historyNoDupOff = absStart + 136;
        const colourTableOff = absStart + 140;

        const safeU16 = (o) => (o + 2 <= absEnd) ? dv.getUint16(o, true) : null;
        const safeI16 = (o) => (o + 2 <= absEnd) ? dv.getInt16(o, true) : null;
        const safeU32 = (o) => (o + 4 <= absEnd) ? dv.getUint32(o, true) : null;
        const safeMetaLen = (o, wanted) => Math.max(0, Math.min(wanted, absEnd - o));

        const faceName = (faceNameOff + 2 <= absEnd)
          ? readFixedUtf16leZ(u8, faceNameOff, 64, absEnd)
          : null;

        const colourTable = [];
        for (let i = 0; i < 16; i++) {
          colourTable.push(safeU32(colourTableOff + (i * 4)));
        }

        out.parsed = {
          fillAttributes: safeU16(fillOff),
          popupFillAttributes: safeU16(popupFillOff),
          screenBufferSizeX: safeI16(sbxOff),
          screenBufferSizeY: safeI16(sbyOff),
          windowSizeX: safeI16(wxOff),
          windowSizeY: safeI16(wyOff),
          windowOriginX: safeI16(windowOriginXOff),
          windowOriginY: safeI16(windowOriginYOff),
          fontSize: safeU32(fontSizeOff),
          fontWidth: safeU16(fontSizeOff),
          fontHeight: safeU16(fontSizeOff + 2),
          fontFamily: safeU32(fontFamilyOff),
          fontWeight: safeU32(fontWeightOff),
          faceName: faceName || null,
          cursorSize: safeU32(cursorOff),
          fullScreen: safeU32(fullScreenOff),
          quickEdit: safeU32(quickEditOff),
          insertMode: safeU32(insertModeOff),
          autoPosition: safeU32(autoPositionOff),
          historyBufferSize: safeU32(historyBufferSizeOff),
          numberOfHistoryBuffers: safeU32(numberOfHistoryBuffersOff),
          historyNoDup: safeU32(historyNoDupOff),
          colourTable,
        };

        meta.fillAttributes = { absOff: fillOff, len: safeMetaLen(fillOff, 2) };
        meta.popupFillAttributes = { absOff: popupFillOff, len: safeMetaLen(popupFillOff, 2) };
        meta.screenBufferSizeX = { absOff: sbxOff, len: safeMetaLen(sbxOff, 2) };
        meta.screenBufferSizeY = { absOff: sbyOff, len: safeMetaLen(sbyOff, 2) };
        meta.windowSizeX = { absOff: wxOff, len: safeMetaLen(wxOff, 2) };
        meta.windowSizeY = { absOff: wyOff, len: safeMetaLen(wyOff, 2) };
        meta.windowOriginX = { absOff: windowOriginXOff, len: safeMetaLen(windowOriginXOff, 2) };
        meta.windowOriginY = { absOff: windowOriginYOff, len: safeMetaLen(windowOriginYOff, 2) };
        meta.fontSize = { absOff: fontSizeOff, len: safeMetaLen(fontSizeOff, 4) };
        meta.fontWidth = { absOff: fontSizeOff, len: safeMetaLen(fontSizeOff, 2) };
        meta.fontHeight = { absOff: fontSizeOff + 2, len: safeMetaLen(fontSizeOff + 2, 2) };
        meta.fontFamily = { absOff: fontFamilyOff, len: safeMetaLen(fontFamilyOff, 4) };
        meta.fontWeight = { absOff: fontWeightOff, len: safeMetaLen(fontWeightOff, 4) };
        meta.faceName = { absOff: faceNameOff, len: safeMetaLen(faceNameOff, 64) };
        meta.cursorSize = { absOff: cursorOff, len: safeMetaLen(cursorOff, 4) };
        meta.fullScreen = { absOff: fullScreenOff, len: safeMetaLen(fullScreenOff, 4) };
        meta.quickEdit = { absOff: quickEditOff, len: safeMetaLen(quickEditOff, 4) };
        meta.insertMode = { absOff: insertModeOff, len: safeMetaLen(insertModeOff, 4) };
        meta.autoPosition = { absOff: autoPositionOff, len: safeMetaLen(autoPositionOff, 4) };
        meta.historyBufferSize = { absOff: historyBufferSizeOff, len: safeMetaLen(historyBufferSizeOff, 4) };
        meta.numberOfHistoryBuffers = { absOff: numberOfHistoryBuffersOff, len: safeMetaLen(numberOfHistoryBuffersOff, 4) };
        meta.historyNoDup = { absOff: historyNoDupOff, len: safeMetaLen(historyNoDupOff, 4) };
        meta.colourTable = { absOff: colourTableOff, len: safeMetaLen(colourTableOff, 64) };
      }
      else if (sig === EXTRA_SIG.PropertyStoreDataBlock) {
        const payloadStart = absStart + 8;
        out.parsed = {
          propertyStoreBytes: Math.max(0, absEnd - payloadStart),
          stringsHintUtf16le: carveUtf16leStrings(u8, payloadStart, absEnd, 6)
        };
        out.carvedUtf16 = out.parsed.stringsHintUtf16le;
        meta.propertyStore = { absOff: payloadStart, len: Math.max(0, absEnd - payloadStart) };
        if (out.carvedUtf16.length) out.notes.push("Heuristic: extracted candidate UTF-16LE strings from serialised property store.");
      }
      else if (sig === EXTRA_SIG.KnownFolderDataBlock) {
        const guidOff = absStart + 8;
        const guid = (guidOff + 16 <= absEnd) ? readGuid(u8, guidOff) : null;
        const mapped = guid ? formatKnownFolderDisplay(guid) : null;
        out.parsed = {
          knownFolderID: guid,
          knownFolderName: mapped
        };
        meta.knownFolderID = { absOff: guidOff, len: Math.min(16, absEnd - guidOff) };
        meta.knownFolderName = meta.knownFolderID;
      }
      else if (sig === EXTRA_SIG.ShimDataBlock) {
        const payloadStart = absStart + 8;
        const hints = carveUtf16leStrings(u8, payloadStart, absEnd, 4);
        out.parsed = { layerNameHint: hints[0] || null, stringsHintUtf16le: hints };
        out.carvedUtf16 = hints;
        meta.layerNameHint = { absOff: payloadStart, len: Math.max(0, absEnd - payloadStart) };
      }
      else {
        const payloadStart = absStart + 8;
        const hints = carveUtf16leStrings(u8, payloadStart, absEnd, 6);
        if (hints.length) out.carvedUtf16 = hints;
      }
    } catch (e) {
      out.notes.push("Parse error: " + (e?.message || String(e)));
    }

    return out;
  }

  // ---------- Parser ----------
  function parseLnk(arrayBuffer) {
    const u8 = new Uint8Array(arrayBuffer);
    const dv = new DataView(arrayBuffer);

    const res = {
      meta: { fileSize: u8.length, parsedAt: new Date().toISOString() },
      header: {},
      sections: [],
      warnings: [],
      errors: [],
      dfir: { suspicious: [], extracted: {}, derived: {} },

      provenance: {
        header: {},
        linkInfo: {},
        stringData: {},
        extraData: {}
      },

      _bytes: u8
    };

    const must = (cond, msg) => { if (!cond) { res.errors.push(msg); return false; } return true; };
    const warn = (cond, msg) => { if (!cond) res.warnings.push(msg); };

    if (!must(u8.length >= 0x4C, "File too small to be a valid .lnk (needs >= 0x4C bytes).")) return res;

    res.provenance.header = {
      headerSize:      { off: 0x00, len: 4 },
      linkCLSID:       { off: 0x04, len: 16 },
      linkFlags:       { off: 0x14, len: 4 },
      fileAttributes:  { off: 0x18, len: 4 },
      creationTimeUtc: { off: 0x1C, len: 8 },
      accessTimeUtc:   { off: 0x24, len: 8 },
      writeTimeUtc:    { off: 0x2C, len: 8 },
      fileSize:        { off: 0x34, len: 4 },
      iconIndex:       { off: 0x38, len: 4 },
      showCommand:     { off: 0x3C, len: 4 },
      showCommandName: { off: 0x3C, len: 4 },
      hotKey:          { off: 0x40, len: 2 },
      hotKeyDecoded:   { off: 0x40, len: 2 }
    };

    const headerSize = dv.getUint32(0, true);
    const linkCLSID = readGuid(u8, 4);
    res.header.headerSize = headerSize;
    res.header.linkCLSID = linkCLSID;

    warn(headerSize === 0x4C, `Unexpected header size: ${headerSize} (expected 0x4C).`);
    warn(linkCLSID === "00021401-0000-0000-c000-000000000046", `Unexpected LinkCLSID: ${linkCLSID} (expected 00021401-0000-0000-c000-000000000046).`);

    const linkFlags = dv.getUint32(0x14, true);
    const fileAttrs = dv.getUint32(0x18, true);
    const cTimeLow = dv.getUint32(0x1C, true), cTimeHigh = dv.getUint32(0x20, true);
    const aTimeLow = dv.getUint32(0x24, true), aTimeHigh = dv.getUint32(0x28, true);
    const wTimeLow = dv.getUint32(0x2C, true), wTimeHigh = dv.getUint32(0x30, true);
    const fileSize = dv.getUint32(0x34, true);
    const iconIndex = dv.getInt32(0x38, true);
    const showCommand = dv.getUint32(0x3C, true);
    const hotKey = dv.getUint16(0x40, true);

    res.header.linkFlags = linkFlags;
    res.header.fileAttributes = fileAttrs;
    res.header.creationTimeUtc = filetimeToIso(cTimeLow, cTimeHigh);
    res.header.accessTimeUtc = filetimeToIso(aTimeLow, aTimeHigh);
    res.header.writeTimeUtc = filetimeToIso(wTimeLow, wTimeHigh);
    res.header.fileSize = fileSize;
    res.header.iconIndex = iconIndex;
    res.header.showCommand = showCommand;
    res.header.showCommandName = showCommandName(showCommand);
    res.header.hotKey = hotKey;
    res.header.hotKeyDecoded = decodeHotKey(hotKey);

    const FLAGS = {
      HasLinkTargetIDList:      0x00000001,
      HasLinkInfo:              0x00000002,
      HasName:                  0x00000004,
      HasRelativePath:          0x00000008,
      HasWorkingDir:            0x00000010,
      HasArguments:             0x00000020,
      HasIconLocation:          0x00000040,
      IsUnicode:                0x00000080,
      ForceNoLinkInfo:          0x00000100,
      HasExpString:             0x00000200,
      DisableLinkPathTracking:  0x00100000,
      PreferEnvironmentPath:    0x02000000
    };

    const FILEATTR = {
      FILE_ATTRIBUTE_READONLY:             0x00000001,
      FILE_ATTRIBUTE_HIDDEN:               0x00000002,
      FILE_ATTRIBUTE_SYSTEM:               0x00000004,
      FILE_ATTRIBUTE_DIRECTORY:            0x00000010,
      FILE_ATTRIBUTE_ARCHIVE:              0x00000020,
      FILE_ATTRIBUTE_NORMAL:               0x00000080,
      FILE_ATTRIBUTE_TEMPORARY:            0x00000100,
      FILE_ATTRIBUTE_REPARSE_POINT:        0x00000400,
      FILE_ATTRIBUTE_OFFLINE:              0x00001000
    };

    res.header.flagsDecoded = Object.entries(FLAGS).filter(([k,m]) => (linkFlags & m) !== 0).map(([k]) => k);
    res.header.fileAttributesDecoded = Object.entries(FILEATTR).filter(([k,m]) => (fileAttrs & m) !== 0).map(([k]) => k);

    let off = 0x4C;
    const isUnicode = (linkFlags & FLAGS.IsUnicode) !== 0;

    if (linkFlags & FLAGS.HasLinkTargetIDList) {
      const start = off;
      if (must(off + 2 <= u8.length, "Truncated LinkTargetIDListSize.")) {
        const idListSize = dv.getUint16(off, true);
        off += 2;
        const listStart = off;
        const listEnd = Math.min(u8.length, off + idListSize);
        warn(off + idListSize <= u8.length, "LinkTargetIDList extends beyond file size.");

        const parsed = parseItemIDList(u8, listStart, Math.max(0, listEnd - listStart));
        off = listEnd;

        res.sections.push({
          name: "LinkTargetIDList",
          start,
          end: off,
          detail: {
            idListSize,
            idListAbsStart: listStart,
            parsedBytes: parsed.parsedBytes,
            itemCount: parsed.items.filter(x => x.kind === "ITEM").length,
            items: parsed.items
          }
        });
      }
    }

    let linkInfoDetail = null;
    if (linkFlags & FLAGS.HasLinkInfo) {
      const start = off;
      if (must(off + 4 <= u8.length, "Truncated LinkInfoSize.")) {
        const linkInfoSize = dv.getUint32(off, true);
        warn(off + linkInfoSize <= u8.length, "LinkInfo extends beyond file size.");
        const linkInfoEnd = Math.min(u8.length, off + linkInfoSize);

        const linkInfoHeaderSize = dv.getUint32(off + 4, true);
        const linkInfoFlags = dv.getUint32(off + 8, true);
        const volumeIDOffset = dv.getUint32(off + 0x0C, true);
        const localBasePathOffset = dv.getUint32(off + 0x10, true);
        const commonNetworkRelativeLinkOffset = dv.getUint32(off + 0x14, true);
        const commonPathSuffixOffset = dv.getUint32(off + 0x18, true);

        let localBasePathOffsetUnicode = null;
        let commonPathSuffixOffsetUnicode = null;
        if (linkInfoHeaderSize >= 0x24 && off + 0x24 <= u8.length) {
          localBasePathOffsetUnicode = dv.getUint32(off + 0x1C, true);
          commonPathSuffixOffsetUnicode = dv.getUint32(off + 0x20, true);
        }

        const detail = {
          linkInfoAbsStart: start,
          linkInfoAbsEnd: linkInfoEnd,
          linkInfoSize,
          linkInfoHeaderSize,
          linkInfoFlags,
          flagsDecoded: [
            ...(linkInfoFlags & 0x1 ? ["VolumeIDAndLocalBasePath"] : []),
            ...(linkInfoFlags & 0x2 ? ["CommonNetworkRelativeLinkAndPathSuffix"] : [])
          ],
          offsets: {
            volumeIDOffset, localBasePathOffset, commonNetworkRelativeLinkOffset, commonPathSuffixOffset,
            localBasePathOffsetUnicode, commonPathSuffixOffsetUnicode
          }
        };

        res.provenance.linkInfo = {
          linkInfoSize: { absOff: start + 0x00, len: 4 },
          linkInfoHeaderSize: { absOff: start + 0x04, len: 4 },
          linkInfoFlags: { absOff: start + 0x08, len: 4 },
          VolumeIDOffset: { absOff: start + 0x0C, len: 4 },
          LocalBasePathOffset: { absOff: start + 0x10, len: 4 },
          CommonNetworkRelativeLinkOffset: { absOff: start + 0x14, len: 4 },
          CommonPathSuffixOffset: { absOff: start + 0x18, len: 4 },
          LocalBasePathOffsetUnicode: localBasePathOffsetUnicode ? { absOff: start + 0x1C, len: 4 } : null,
          CommonPathSuffixOffsetUnicode: commonPathSuffixOffsetUnicode ? { absOff: start + 0x20, len: 4 } : null,
        };

        function readOffsetAnsiWithRange(rel, provKey) {
          if (!rel) return { value: null, range: null };
          const abs = off + rel;
          if (abs >= linkInfoEnd) return { value: null, range: null };
          const r = readNullTerminatedAnsi(u8, abs, linkInfoEnd);
          const rng = ansiStringRange(u8, abs, linkInfoEnd);
          if (provKey && rng.len > 0) res.provenance.linkInfo[provKey] = rng;
          return { value: r.value, range: rng };
        }
        function readOffsetUtf16WithRange(rel, provKey) {
          if (!rel) return { value: null, range: null };
          const abs = off + rel;
          if (abs >= linkInfoEnd) return { value: null, range: null };
          const r = readNullTerminatedUtf16le(u8, abs, linkInfoEnd);
          const rng = utf16leStringRange(u8, abs, linkInfoEnd);
          if (provKey && rng.len > 0) res.provenance.linkInfo[provKey] = rng;
          return { value: r.value, range: rng };
        }

        const lbpA = readOffsetAnsiWithRange(localBasePathOffset, "LocalBasePathAnsiString");
        const cpsA = readOffsetAnsiWithRange(commonPathSuffixOffset, "CommonPathSuffixAnsiString");
        const lbpU = readOffsetUtf16WithRange(localBasePathOffsetUnicode, "LocalBasePathUnicodeString");
        const cpsU = readOffsetUtf16WithRange(commonPathSuffixOffsetUnicode, "CommonPathSuffixUnicodeString");

        detail.localBasePath = lbpA.value;
        detail.commonPathSuffix = cpsA.value;
        detail.localBasePathUnicode = lbpU.value;
        detail.commonPathSuffixUnicode = cpsU.value;

        // VolumeID
        if (volumeIDOffset && (linkInfoFlags & 0x1)) {
          const vAbs = off + volumeIDOffset;
          if (vAbs + 0x10 <= linkInfoEnd) {
            const volSize = dv.getUint32(vAbs, true);
            const driveType = dv.getUint32(vAbs + 4, true);
            const driveSerial = dv.getUint32(vAbs + 8, true);
            const volLabelOffset = dv.getUint32(vAbs + 0x0C, true);

            const vol = {
              volAbsStart: vAbs,
              volSize,
              driveType,
              driveTypeName: driveTypeName(driveType),
              driveSerial: hex(driveSerial),
              volumeLabel: null
            };

            if (volLabelOffset) {
              const p = vAbs + volLabelOffset;
              if (p < linkInfoEnd) {
                vol.volumeLabel = readNullTerminatedAnsi(u8, p, linkInfoEnd).value;
                const rng = ansiStringRange(u8, p, linkInfoEnd);
                if (rng.len > 0) res.provenance.linkInfo["VolumeID_VolumeLabelString"] = rng;
              }
            }

            detail.volumeID = vol;

            const volStructLen = Math.min(volSize, Math.max(0, linkInfoEnd - vAbs));
            if (volStructLen > 0) res.provenance.linkInfo["VolumeID_Struct"] = { absOff: vAbs, len: volStructLen };
          }
        }

        // CommonNetworkRelativeLink
        if (commonNetworkRelativeLinkOffset && (linkInfoFlags & 0x2)) {
          const nAbs = off + commonNetworkRelativeLinkOffset;
          if (nAbs + 0x14 <= linkInfoEnd) {
            const cnrlSize = dv.getUint32(nAbs, true);
            const cnrlFlags = dv.getUint32(nAbs + 4, true);
            const netNameOffset = dv.getUint32(nAbs + 8, true);
            const deviceNameOffset = dv.getUint32(nAbs + 0x0C, true);
            const networkProviderType = dv.getUint32(nAbs + 0x10, true);

            const cnrl = {
              cnrlAbsStart: nAbs,
              cnrlSize,
              cnrlFlags,
              netName: null,
              deviceName: null,
              networkProviderType: hex(networkProviderType),
              netNameAbs: netNameOffset ? (nAbs + netNameOffset) : null,
              deviceNameAbs: deviceNameOffset ? (nAbs + deviceNameOffset) : null
            };

            const cnrlStructLen = Math.min(cnrlSize, Math.max(0, linkInfoEnd - nAbs));
            if (cnrlStructLen > 0) res.provenance.linkInfo["CNRL_Struct"] = { absOff: nAbs, len: cnrlStructLen };

            if (netNameOffset) {
              const p = nAbs + netNameOffset;
              if (p < linkInfoEnd) {
                cnrl.netName = readNullTerminatedAnsi(u8, p, linkInfoEnd).value;
                const rng = ansiStringRange(u8, p, linkInfoEnd);
                if (rng.len > 0) res.provenance.linkInfo["CNRL_NetNameString"] = rng;
              }
            }
            if (deviceNameOffset) {
              const p = nAbs + deviceNameOffset;
              if (p < linkInfoEnd) {
                cnrl.deviceName = readNullTerminatedAnsi(u8, p, linkInfoEnd).value;
                const rng = ansiStringRange(u8, p, linkInfoEnd);
                if (rng.len > 0) res.provenance.linkInfo["CNRL_DeviceNameString"] = rng;
              }
            }
            detail.commonNetworkRelativeLink = cnrl;
          }
        }

        res.sections.push({ name: "LinkInfo", start, end: linkInfoEnd, detail });
        linkInfoDetail = detail;
        off = linkInfoEnd;
      }
    }

    function readCountedString(off0, label) {
      if (off0 + 2 > u8.length) return { off: off0, value: null, ok: false };
      const cch = dv.getUint16(off0, true);
      let off1 = off0 + 2;
      let value = null;
      if (isUnicode) {
        const byteLen = cch * 2;
        const end = Math.min(u8.length, off1 + byteLen);
        value = new TextDecoder("utf-16le", {fatal:false}).decode(u8.slice(off1, end));
        off1 = end;
      } else {
        const end = Math.min(u8.length, off1 + cch);
        value = new TextDecoder("windows-1252", {fatal:false}).decode(u8.slice(off1, end));
        off1 = end;
      }
      return { off: off1, value, cch, label, ok: true };
    }

    const strings = [];
    const stringOrder = [
      ["NAME_STRING", 0x00000004],
      ["RELATIVE_PATH", 0x00000008],
      ["WORKING_DIR", 0x00000010],
      ["COMMAND_LINE_ARGUMENTS", 0x00000020],
      ["ICON_LOCATION", 0x00000040]
    ];

    for (const [label, mask] of stringOrder) {
      if (linkFlags & mask) {
        const start = off;
        const r = readCountedString(off, label);
        if (!r.ok) { res.warnings.push(`Truncated StringData (${label}).`); break; }
        off = r.off;

        strings.push({ label, cch: r.cch, value: r.value, start, end: off });
        res.provenance.stringData[label] = { start, end: off, len: off - start };
      }
    }

    res.sections.push({
      name: "StringData",
      start: strings.length ? strings[0].start : off,
      end: strings.length ? strings[strings.length-1].end : off,
      detail: { isUnicode, strings }
    });

    const extraStart = off;
    const extraBlocks = [];
    let extraIndex = 0;

    while (off + 4 <= u8.length) {
      const blockSize = dv.getUint32(off, true);
      if (blockSize === 0) {
        extraBlocks.push({ start: off, end: off+4, type:"TerminalBlock", size: 4, signature: null, parsed: null, meta: { _block: { absOff: off, len: 4 } } });
        off += 4;
        break;
      }
      if (blockSize < 8) { res.warnings.push(`ExtraData block size too small (${blockSize}) at ${hex(off)}; stopping parse.`); break; }

      const start = off;
      const end = Math.min(u8.length, off + blockSize);
      const parsed = parseExtraBlock(u8, start, end);

      extraBlocks.push({
        start, end,
        signature: parsed.signature,
        size: blockSize,
        type: parsed.type,
        parsed: parsed.parsed,
        meta: parsed.meta,
        notes: parsed.notes || [],
        carvedUtf16: parsed.carvedUtf16 || []
      });

      res.provenance.extraData[String(extraIndex)] = parsed.meta || { _block: { absOff: start, len: Math.max(1, end-start) } };
      extraIndex++;

      off = end;
    }

    res.sections.push({ name: "ExtraData", start: extraStart, end: off, detail: { blocks: extraBlocks } });

    const getStr = (label) => strings.find(s => s.label === label)?.value ?? null;
    const arg = getStr("COMMAND_LINE_ARGUMENTS");
    const iconLoc = getStr("ICON_LOCATION");
    const rel = getStr("RELATIVE_PATH");
    const work = getStr("WORKING_DIR");
    const nameStr = getStr("NAME_STRING");

    const localBase = linkInfoDetail?.localBasePathUnicode || linkInfoDetail?.localBasePath || null;
    const suffix = linkInfoDetail?.commonPathSuffixUnicode || linkInfoDetail?.commonPathSuffix || null;
    const netName = linkInfoDetail?.commonNetworkRelativeLink?.netName || null;

    const envBlock = extraBlocks.find(b => b.type === "EnvironmentVariableDataBlock") || null;
    const envVar = envBlock?.parsed || null;
    const envTargetUnicode = typeof envVar?.targetUnicode === "string" && envVar.targetUnicode.trim()
      ? envVar.targetUnicode.trim()
      : null;
    const envTargetAnsi = typeof envVar?.targetAnsi === "string" && envVar.targetAnsi.trim()
      ? envVar.targetAnsi.trim()
      : null;
    const envTarget = envTargetUnicode || envTargetAnsi || null;

    const hasExpString = (linkFlags & FLAGS.HasExpString) !== 0;
    const disableLinkPathTracking = (linkFlags & FLAGS.DisableLinkPathTracking) !== 0;
    const preferEnvironmentPath = (linkFlags & FLAGS.PreferEnvironmentPath) !== 0;

    let structuredTarget = null;
    let structuredTargetSource = null;
    if (localBase && suffix) {
      structuredTarget = localBase + suffix;
      structuredTargetSource = "LinkInfo local base path + common path suffix";
    } else if (localBase) {
      structuredTarget = localBase;
      structuredTargetSource = "LinkInfo local base path";
    } else if (netName && suffix) {
      structuredTarget = netName + (netName.endsWith("\\") ? "" : "\\") + suffix.replace(/^\\+/, "");
      structuredTargetSource = "LinkInfo network share + common path suffix";
    } else if (netName) {
      structuredTarget = netName;
      structuredTargetSource = "LinkInfo network share";
    } else if (rel && work) {
      structuredTarget = work.replace(/[\\\/]+$/, "\\") + rel.replace(/^\\+/, "");
      structuredTargetSource = "StringData working directory + relative path";
    } else if (rel) {
      structuredTarget = rel;
      structuredTargetSource = "StringData relative path";
    } else if (work) {
      structuredTarget = work;
      structuredTargetSource = "StringData working directory";
    }

    let best = structuredTarget;
    let targetSource = structuredTargetSource;
    let targetResolution = structuredTarget
      ? "Resolved from standard path structures"
      : "No standard LinkInfo or StringData target was resolved";
    let environmentTargetStatus = envTarget ? "Present" : "Not present";

    if (envBlock && !hasExpString) {
      res.warnings.push("EnvironmentVariableDataBlock is present but the HasExpString LinkFlag is not set.");
    }
    if (hasExpString && !envBlock) {
      res.warnings.push("HasExpString is set but no EnvironmentVariableDataBlock was found.");
    }
    if (envTargetUnicode && envTargetAnsi && envTargetUnicode !== envTargetAnsi) {
      res.warnings.push("EnvironmentVariableDataBlock ANSI and Unicode targets differ; Unicode was preferred.");
    }

    if (envTarget) {
      const encodingLabel = envTargetUnicode
        ? (envTargetAnsi && envTargetAnsi === envTargetUnicode ? "Unicode/ANSI agree" : "Unicode")
        : "ANSI";

      if (disableLinkPathTracking) {
        environmentTargetStatus = "Present but ignored because DisableLinkPathTracking is set";
        if (!best) targetResolution = environmentTargetStatus;
      } else if (hasExpString) {
        if (preferEnvironmentPath || !best) {
          best = envTarget;
          targetSource = `EnvironmentVariableDataBlock (${encodingLabel})`;
          targetResolution = preferEnvironmentPath
            ? "Resolved from EnvironmentVariableDataBlock; PreferEnvironmentPath is set"
            : "Resolved from EnvironmentVariableDataBlock because no standard path target was available";
          environmentTargetStatus = preferEnvironmentPath
            ? "Selected as the preferred target"
            : "Selected as the available target";
        } else {
          environmentTargetStatus = "Available as an alternative target; standard path structures take precedence";
        }
      } else {
        environmentTargetStatus = "Present but unconfirmed because HasExpString is not set";
        if (!best) {
          best = envTarget;
          targetSource = `EnvironmentVariableDataBlock (${encodingLabel}; flag mismatch)`;
          targetResolution = "Unconfirmed target candidate from EnvironmentVariableDataBlock";
        }
      }
    } else if (preferEnvironmentPath) {
      res.warnings.push("PreferEnvironmentPath is set but no environment target string was found.");
      if (!best) targetResolution = "PreferEnvironmentPath is set, but no environment target was available";
    }

    const tracker = extraBlocks.find(b => b.type === "TrackerDataBlock")?.parsed || null;
    const props = extraBlocks.find(b => b.type === "PropertyStoreDataBlock")?.parsed || null;
    const knownFolder = extraBlocks.find(b => b.type === "KnownFolderDataBlock")?.parsed || null;

    res.dfir.extracted = {
      localBasePath: localBase,
      commonPathSuffix: suffix,
      networkShare: netName,
      relativePath: rel,
      workingDir: work,
      arguments: arg,
      iconLocation: iconLoc,
      nameString: nameStr,

      knownFolderID: knownFolder?.knownFolderID ?? null,
      knownFolderName: knownFolder?.knownFolderName ?? null,

      extra_envTargetUnicode: envVar?.targetUnicode ?? null,
      extra_envTargetAnsi: envVar?.targetAnsi ?? null,
      extra_machineID: tracker?.machineID ?? null,
      extra_macAddresses: tracker?.macAddresses ?? [],
      extra_propertyHints: props?.stringsHintUtf16le?.slice?.(0,5) ?? null
    };

    res.dfir.derived = {
      bestTargetPath: best,
      targetSource,
      targetResolution,
      environmentTargetStatus,
      showCommand: res.header.showCommandName,
      hotKey: res.header.hotKeyDecoded.display
    };

    if (arg && /powershell|cmd\.exe|wscript|cscript|mshta|rundll32|regsvr32/i.test(arg)) res.dfir.suspicious.push("Arguments reference a common LOLBin/command interpreter.");
    if (arg && /-enc|-encodedcommand|FromBase64String|IEX|Invoke-Expression/i.test(arg)) res.dfir.suspicious.push("Arguments contain patterns often associated with obfuscated PowerShell.");
    const anyUNC = [localBase, best, envTarget, rel, work, arg, iconLoc].some(looksUNC);
    const anyDrive = [localBase, best, envTarget, rel, work].some(looksDrivePath);
    if (anyUNC && anyDrive) res.dfir.suspicious.push("Mix of UNC and local drive paths across fields.");
    if (envVar?.targetUnicode && looksUNC(envVar.targetUnicode)) res.dfir.suspicious.push("EnvironmentVariableDataBlock target appears to be a UNC path.");

    return res;
  }

  // ---------- UI ----------
  const $file = document.getElementById("file");
  const $drop = document.getElementById("drop");
  const $out = document.getElementById("out");
  const $alerts = document.getElementById("alerts");
  const $status = document.getElementById("status");
  const $copyJson = document.getElementById("copyJson");
  const $downloadJson = document.getElementById("downloadJson");
  const $fileNameHint = document.getElementById("fileNameHint");

  let lastParsed = null;
  let lastName = "shortcut.lnk";

  function setAlerts(parsed) {
    $alerts.innerHTML = "";
    if (parsed.errors?.length) {
      $alerts.appendChild(el("div", {class:"bad"}, [
        el("div", {html:`<strong>Errors</strong> (${parsed.errors.length})`}),
        el("div", {class:"small"}, [parsed.errors.join(" • ")])
      ]));
    }
    if (parsed.warnings?.length) {
      $alerts.appendChild(el("div", {class:"warn"}, [
        el("div", {html:`<strong>Warnings</strong> (${parsed.warnings.length})`}),
        el("div", {class:"small"}, [parsed.warnings.join(" • ")])
      ]));
    }
    if (!parsed.errors?.length) {
      $alerts.appendChild(el("div", {class:"ok"}, [
        el("div", {html:`<strong>Parsed</strong> ${parsed.meta.fileSize.toLocaleString()} bytes`}),
        el("div", {class:"small"}, [`Parsed at ${parsed.meta.parsedAt}`])
      ]));
    }
  }

  let hexUI = null;
  let hexJumpSequence = 0;

  function sectionDetails(title, subtitle, bodyNode, id=null) {
    const d = el("details", {class:"section-card"});
    if (id) d.id = id;

    const summaryCopy = el("span", {class:"section-summary-copy"}, [
      el("span", {class:"section-title"}, [title])
    ]);
    if (subtitle) summaryCopy.appendChild(el("span", {class:"section-subtitle"}, [subtitle]));

    const s = el("summary", {class:"section-summary"}, [summaryCopy]);
    d.appendChild(s);
    d.appendChild(el("div", {class:"section-body"}, [bodyNode]));
    return d;
  }

  function renderPills(list) {
    const wrap = el("div");
    for (const x of (list || [])) wrap.appendChild(el("span", {class:"pill mono small"}, [x]));
    return wrap;
  }

  function clickableText(txt, title, onClick) {
    const span = el("span", {class:"clickable", title}, [txt]);
    span.addEventListener("click", onClick);
    return span;
  }

  function nextLayoutFrame() {
    return new Promise(resolve => requestAnimationFrame(() => resolve()));
  }

  async function settleLayout(frameCount = 2) {
    for (let i = 0; i < frameCount; i++) await nextLayoutFrame();
  }

  async function jumpToRange(absOffset, byteLen, label = "") {
    if (!hexUI || !lastParsed?._bytes?.length) return;
    const jumpId = ++hexJumpSequence;

    const fileLen = lastParsed._bytes.length;
    const rawStart = Number(absOffset);
    const rawLen = Number(byteLen);
    if (!Number.isFinite(rawStart)) return;

    const startAbs = Math.max(0, Math.min(fileLen - 1, Math.trunc(rawStart)));
    const length = Number.isFinite(rawLen) ? Math.max(1, Math.trunc(rawLen)) : 1;
    const endAbs = Math.min(fileLen, startAbs + length);

    hexUI.setSelectedRange({ startAbs, endAbs, label });
    hexUI.setHoverRange(null);
    hexUI.setAnchorAbs(startAbs);
    hexUI.searchInput.value = "";

    const pad = 256;
    const focus = Math.max(0, startAbs - pad);

    hexUI.details.open = true;
    // One refresh only. Starting at scrollTop 0 avoids carrying a stale scroll
    // position from Head/Tail or an earlier focus window into the new view.
    hexUI.setView("focus", focus, false);
    hexUI.details.scrollIntoView({ behavior: "auto", block: "start" });

    // Let <details>, the toolbar and the virtual viewport finish layout before
    // calculating the inner scroll position.
    await settleLayout(2);
    if (jumpId !== hexJumpSequence) return;
    await hexUI.scrollToOffset(startAbs, () => jumpId === hexJumpSequence);
  }

  async function jumpToValueSearch(value) {
    if (!hexUI || !lastParsed?._bytes?.length) return;
    const jumpId = ++hexJumpSequence;

    let needle = String(value ?? "");
    if (needle.length > 300) needle = needle.slice(0, 300);

    const hit = findNeedle(lastParsed._bytes, needle);

    hexUI.setSelectedRange(null);
    hexUI.setAnchorAbs(null);
    hexUI.setHoverRange(null);
    hexUI.details.open = true;
    hexUI.searchInput.value = needle;

    if (hit.pos >= 0) {
      const focus = Math.max(0, hit.pos - 256);
      hexUI.setView("focus", focus, false);
      hexUI.details.scrollIntoView({ behavior: "auto", block: "start" });
      await settleLayout(2);
      if (jumpId !== hexJumpSequence) return;
      await hexUI.scrollToOffset(hit.pos, () => jumpId === hexJumpSequence);
    } else {
      hexUI.setView("head", 0, false);
      hexUI.details.scrollIntoView({ behavior: "auto", block: "start" });
    }
  }

  function buildKnownRanges(parsed) {
    const ranges = [];
    const fileLen = parsed?._bytes?.length ?? 0;
    const clamp = (n) => Math.max(0, Math.min(fileLen, n|0));
    const pushRange = (name, start, end, section) => {
      if (!Number.isFinite(start) || !Number.isFinite(end)) return;
      const s = clamp(start);
      const e = clamp(end);
      if (e <= s) return;
      ranges.push({ name, start: s, end: e, section });
    };

    for (const [k,m] of Object.entries(parsed.provenance.header || {})) {
      pushRange(`Header.${k}`, (m.off|0), (m.off|0) + (m.len|0), "Header");
    }

    for (const [k,m] of Object.entries(parsed.provenance.linkInfo || {})) {
      if (!m) continue;
      pushRange(`LinkInfo.${k}`, (m.absOff|0), (m.absOff|0) + (m.len|0), "LinkInfo");
    }

    for (const [label,m] of Object.entries(parsed.provenance.stringData || {})) {
      pushRange(`StringData.${label}`, (m.start|0), (m.end|0), "StringData");
    }

    for (const [idx, meta] of Object.entries(parsed.provenance.extraData || {})) {
      if (!meta) continue;
      for (const [k,m] of Object.entries(meta)) {
        if (!m || !Number.isFinite(m.absOff) || !Number.isFinite(m.len)) continue;
        const nm = (k === "_block") ? `ExtraData[${idx}].block` : `ExtraData[${idx}].${k}`;
        pushRange(nm, (m.absOff|0), (m.absOff|0) + (m.len|0), "ExtraData");
      }
    }

    ranges.sort((a,b) => (a.end-a.start) - (b.end-b.start) || a.start - b.start);
    return ranges;
  }

  function topLevelSectionForOffset(parsed, offAbs) {
    const sec = (parsed.sections || []).find(s => offAbs >= s.start && offAbs < s.end);
    return sec ? sec.name : null;
  }

  function mostSpecificFieldCovering(ranges, absOff) {
    let best = null;
    let bestLen = Infinity;
    for (const r of ranges) {
      if (absOff < r.start || absOff >= r.end) continue;
      const len = r.end - r.start;
      if (len < bestLen || (len === bestLen && best && r.start > best.start)) {
        best = r;
        bestLen = len;
      } else if (len === bestLen && !best) {
        best = r;
      }
    }
    return best;
  }

  function renderKV(obj, opts = {}) {
    const g = el("div", {class:"grid"});
    const meta = opts.meta || {};
    const enableStringSearch = !!opts.enableStringSearch;

    for (const [k, v] of Object.entries(obj)) {
      g.appendChild(el("div", {class:"k"}, [k]));
      const container = el("div", {class:"v mono"});

      const m = meta[k];
      const hasMeta = m && Number.isFinite(m.off ?? m.absOff) && Number.isFinite(m.len);

      if (hasMeta) {
        const abs = (m.absOff ?? m.off) | 0;
        const txt =
          v === null ? "null" :
          (typeof v === "object" ? JSON.stringify(v) : String(v));

        container.appendChild(clickableText(
          txt,
          `Jump to ${k} @ ${hex(abs)} (len ${m.len})`,
          () => jumpToRange(abs, m.len, k)
        ));
        container.appendChild(el("span", {class:"muted small", style:"margin-left:10px"}, [`(${hex(abs)} +${m.len})`]));
        g.appendChild(container);
        continue;
      }

      if (typeof v === "string") {
        const gnorm = normaliseGuidString(v);
        if (gnorm) {
          const mapped = formatKnownFolderDisplay(gnorm);
          if (mapped) {
            container.appendChild(document.createTextNode(`${v}  →  ${mapped}`));
            g.appendChild(container);
            continue;
          }
        }
      }

      if (enableStringSearch && typeof v === "string" && v.length >= 2) {
        container.appendChild(clickableText(
          v,
          "Click to search (ASCII + UTF-16LE) and jump near first match in hex",
          () => jumpToValueSearch(v)
        ));
        g.appendChild(container);
        continue;
      }

      if (v === null) container.appendChild(document.createTextNode("null"));
      else if (typeof v === "object") container.appendChild(el("span", {}, [JSON.stringify(v, null, 2)]));
      else container.appendChild(document.createTextNode(String(v)));
      g.appendChild(container);
    }
    return g;
  }

  function renderLinkInfoJumpTable(linkInfoDetail) {
    if (!linkInfoDetail) return el("div", {class:"muted small"}, ["No LinkInfo present."]);

    const base = linkInfoDetail.linkInfoAbsStart;
    const liEnd = linkInfoDetail.linkInfoAbsEnd;
    const offsets = linkInfoDetail.offsets || {};
    const rows = [];

    rows.push({ name: "LinkInfo (entire)", abs: base, len: Math.max(1, liEnd - base), note: `Range ${hex(base)}–${hex(liEnd)}` });

    if (linkInfoDetail.volumeID?.volAbsStart && linkInfoDetail.volumeID?.volSize) {
      rows.push({ name: "VolumeID (struct)", abs: linkInfoDetail.volumeID.volAbsStart, len: linkInfoDetail.volumeID.volSize, note: `Size ${linkInfoDetail.volumeID.volSize}` });
    } else if (offsets.volumeIDOffset) {
      rows.push({ name: "VolumeIDOffset (start only)", abs: base + offsets.volumeIDOffset, len: 16, note: "No parsed size; highlighting 16 bytes" });
    }

    if (linkInfoDetail.commonNetworkRelativeLink?.cnrlAbsStart && linkInfoDetail.commonNetworkRelativeLink?.cnrlSize) {
      rows.push({ name: "CommonNetworkRelativeLink (struct)", abs: linkInfoDetail.commonNetworkRelativeLink.cnrlAbsStart, len: linkInfoDetail.commonNetworkRelativeLink.cnrlSize, note: `Size ${linkInfoDetail.commonNetworkRelativeLink.cnrlSize}` });
    } else if (offsets.commonNetworkRelativeLinkOffset) {
      rows.push({ name: "CommonNetworkRelativeLinkOffset (start only)", abs: base + offsets.commonNetworkRelativeLinkOffset, len: 20, note: "No parsed size; highlighting 20 bytes" });
    }

    const strTargets = [
      ["LocalBasePathOffset", offsets.localBasePathOffset],
      ["CommonPathSuffixOffset", offsets.commonPathSuffixOffset],
      ["LocalBasePathOffsetUnicode", offsets.localBasePathOffsetUnicode],
      ["CommonPathSuffixOffsetUnicode", offsets.commonPathSuffixOffsetUnicode],
    ];
    for (const [n, rel] of strTargets) {
      if (!rel) continue;
      rows.push({ name: n, abs: base + rel, len: 64, note: "Start of string; highlighting 64 bytes" });
    }

    const cnrl = linkInfoDetail.commonNetworkRelativeLink;
    if (cnrl?.netNameAbs) rows.push({ name: "CNRL NetName (start)", abs: cnrl.netNameAbs, len: 96, note: "Start of net name; highlighting 96 bytes" });
    if (cnrl?.deviceNameAbs) rows.push({ name: "CNRL DeviceName (start)", abs: cnrl.deviceNameAbs, len: 96, note: "Start of device name; highlighting 96 bytes" });

    const t = el("table", {class:"small"});
    t.appendChild(el("thead", {}, [el("tr", {}, [
      el("th", {}, ["Field/structure"]),
      el("th", {}, ["Absolute offset (click)"]),
      el("th", {}, ["Length highlighted"]),
      el("th", {}, ["Notes"])
    ])]));
    const tb = el("tbody");

    const fileLen = lastParsed?._bytes?.length ?? 0;
    for (const r of rows) {
      const valid = Number.isFinite(r.abs) && r.abs >= 0 && r.abs < fileLen;
      const absCell = el("td", {class:"mono"});
      if (valid) absCell.appendChild(clickableText(hex(r.abs), "Jump and highlight this range", () => jumpToRange(r.abs, r.len, r.name)));
      else absCell.appendChild(document.createTextNode("n/a"));

      tb.appendChild(el("tr", {}, [
        el("td", {}, [r.name]),
        absCell,
        el("td", {class:"mono"}, [String(r.len)]),
        el("td", {class:"mono"}, [r.note || ""])
      ]));
    }

    t.appendChild(tb);
    return t;
  }

  function trackerSourceMetaKey(source) {
    const m = String(source || "").match(/^(DROID|DROIDBirth)\[(0|1)\]$/);
    if (!m) return null;
    if (m[1] === "DROID") return `droid${m[2]}`;
    return `droidBirth${m[2]}`;
  }

  function trackerSourceNodeMetaKey(source) {
    const base = trackerSourceMetaKey(source);
    return base ? `${base}Node` : null;
  }

  function renderTrackerDataBlock(block) {
    const parsed = block?.parsed || {};
    const meta = block?.meta || {};
    const wrap = el("div");

    wrap.appendChild(renderKV({
      signature: block.signature,
      blockSize: block.size,
      start: hex(block.start),
      end: hex(block.end),
      length: parsed.length,
      version: parsed.version
    }, {
      meta: {
        signature: meta._block,
        blockSize: meta._block,
        start: meta._block,
        end: meta._block,
        length: meta.length,
        version: meta.version
      }
    }));

    const card = el("div", {class:"tracker-card"});
    const macDetails = Array.isArray(parsed.macAddressDetails) ? parsed.macAddressDetails : [];
    const candidateCount = macDetails.length;

    card.appendChild(el("div", {class:"tracker-card-head"}, [
      el("div", {class:"tracker-card-title"}, ["Machine identity"]),
      el("span", {class:"badge small"}, [
        candidateCount
          ? `${candidateCount} MAC candidate${candidateCount === 1 ? "" : "s"}`
          : "No physical MAC candidate"
      ])
    ]));

    const grid = el("div", {class:"tracker-identity-grid"});
    grid.appendChild(el("div", {class:"tracker-label"}, ["Machine ID"]));
    const machineCell = el("div", {class:"tracker-machine mono"});
    const machineText = parsed.machineID || "Not present";
    if (parsed.machineID && meta.machineID) {
      machineCell.appendChild(clickableText(
        machineText,
        `Jump to MachineID @ ${hex(meta.machineID.absOff)}`,
        () => jumpToRange(meta.machineID.absOff, meta.machineID.len, "TrackerDataBlock MachineID")
      ));
    } else {
      machineCell.appendChild(document.createTextNode(machineText));
    }
    grid.appendChild(machineCell);

    grid.appendChild(el("div", {class:"tracker-label"}, ["MAC address"]));
    const macCell = el("div");
    if (!macDetails.length) {
      macCell.appendChild(el("span", {class:"muted"}, ["No UUID-v1 physical MAC-address candidate found."]));
    } else {
      const list = el("div", {class:"tracker-mac-list"});
      for (const item of macDetails) {
        const entry = el("div", {class:"tracker-mac-entry"});
        const top = el("div", {class:"tracker-mac-line"});
        const sources = Array.isArray(item.sources) ? item.sources : [];
        const firstSourceMeta = sources
          .map(source => trackerSourceNodeMetaKey(source))
          .map(key => key ? meta[key] : null)
          .find(Boolean);

        if (item.address && firstSourceMeta) {
          top.appendChild(clickableText(
            item.address,
            `Jump to MAC/node bytes @ ${hex(firstSourceMeta.absOff)}`,
            () => jumpToRange(firstSourceMeta.absOff, firstSourceMeta.len, `MAC address ${item.address}`)
          ));
          top.lastChild.classList.add("tracker-mac-address", "mono");
        } else {
          top.appendChild(el("span", {class:"tracker-mac-address mono"}, [item.address || "Unknown"]));
        }
        if (item.administration) {
          top.appendChild(el("span", {class:"badge small"}, [item.administration]));
        }
        entry.appendChild(top);

        if (sources.length) {
          const sourceLine = el("div", {class:"tracker-source"}, ["Found in "]);
          sources.forEach((source, index) => {
            if (index) sourceLine.appendChild(document.createTextNode(" and "));
            const sourceKey = trackerSourceNodeMetaKey(source);
            const sourceMeta = sourceKey ? meta[sourceKey] : null;
            if (sourceMeta) {
              const sourceLink = clickableText(
                source,
                `Jump to ${source} MAC/node bytes @ ${hex(sourceMeta.absOff)}`,
                () => jumpToRange(sourceMeta.absOff, sourceMeta.len, `${source} MAC/node`)
              );
              sourceLink.classList.add("tracker-source-link", "mono");
              sourceLine.appendChild(sourceLink);
            } else {
              sourceLine.appendChild(el("span", {class:"mono"}, [source]));
            }
          });
          entry.appendChild(sourceLine);
        }
        list.appendChild(entry);
      }
      macCell.appendChild(list);
    }
    grid.appendChild(macCell);
    card.appendChild(grid);
    wrap.appendChild(card);

    const droid = Array.isArray(parsed.droid) ? parsed.droid : [];
    const droidBirth = Array.isArray(parsed.droidBirth) ? parsed.droidBirth : [];
    const nodeInfo = Array.isArray(parsed.uuidV1Nodes) ? parsed.uuidV1Nodes : [];

    const provenance = el("details", {class:"tracker-provenance"});
    provenance.appendChild(el("summary", {}, ["UUID and DROID provenance"]));

    const table = el("table", {class:"small"});
    table.appendChild(el("thead", {}, [el("tr", {}, [
      el("th", {}, ["Source"]),
      el("th", {}, ["GUID"]),
      el("th", {}, ["UUID node interpretation"])
    ])]));
    const tbody = el("tbody");

    const rows = [
      ...droid.map((guid, index) => ({ source:`DROID[${index}]`, guid })),
      ...droidBirth.map((guid, index) => ({ source:`DROIDBirth[${index}]`, guid }))
    ];

    for (const row of rows) {
      const sourceKey = trackerSourceMetaKey(row.source);
      const sourceMeta = sourceKey ? meta[sourceKey] : null;
      const sourceCell = el("td", {class:"mono"});
      if (sourceMeta) {
        sourceCell.appendChild(clickableText(
          row.source,
          `Jump to ${row.source} @ ${hex(sourceMeta.absOff)}`,
          () => jumpToRange(sourceMeta.absOff, sourceMeta.len, row.source)
        ));
      } else {
        sourceCell.appendChild(document.createTextNode(row.source));
      }
      const guidCell = el("td", {class:"mono tracker-guid"});
      if (sourceMeta) {
        guidCell.appendChild(clickableText(
          row.guid,
          `Jump to ${row.source} @ ${hex(sourceMeta.absOff)}`,
          () => jumpToRange(sourceMeta.absOff, sourceMeta.len, row.source)
        ));
      } else {
        guidCell.appendChild(document.createTextNode(row.guid));
      }

      const info = nodeInfo.find(x => x.source === row.source && x.guid === row.guid);
      let interpretation = "—";
      if (info) {
        if (info.isMacAddressCandidate) {
          interpretation = `${info.node} — ${info.isLocallyAdministered ? "locally" : "globally"} administered MAC candidate`;
        } else if (info.isMulticastNode) {
          interpretation = `${info.node} — synthetic/random UUID node`;
        } else {
          interpretation = `${info.node} — UUID-v1 node`;
        }
      }

      const interpretationCell = el("td", {class:"mono"});
      const nodeMetaKey = trackerSourceNodeMetaKey(row.source);
      const nodeMeta = nodeMetaKey ? meta[nodeMetaKey] : null;
      if (info && nodeMeta) {
        interpretationCell.appendChild(clickableText(
          interpretation,
          `Jump to UUID node bytes @ ${hex(nodeMeta.absOff)}`,
          () => jumpToRange(nodeMeta.absOff, nodeMeta.len, `${row.source} UUID node`)
        ));
      } else {
        interpretationCell.appendChild(document.createTextNode(interpretation));
      }

      tbody.appendChild(el("tr", {}, [
        sourceCell,
        guidCell,
        interpretationCell
      ]));
    }

    if (!rows.length) {
      tbody.appendChild(el("tr", {}, [
        el("td", {colspan:"3", class:"muted"}, ["No DROID identifiers parsed."])
      ]));
    }

    table.appendChild(tbody);
    provenance.appendChild(table);
    wrap.appendChild(provenance);

    return wrap;
  }

  function renderExtraDataTable(blocks) {
    if (!blocks?.length) return el("div", {class:"muted small"}, ["No ExtraData blocks parsed."]);
    const t = el("table", {class:"small"});
    t.appendChild(el("thead", {}, [el("tr", {}, [
      el("th", {}, ["Block"]),
      el("th", {}, ["Type (click highlights block)"]),
      el("th", {}, ["Start (click)"]),
      el("th", {}, ["Size"]),
      el("th", {}, ["Interesting"])
    ])]));
    const tb = el("tbody");

    for (let i=0;i<blocks.length;i++) {
      const b = blocks[i];
      const size = Math.max(1, (b.end - b.start));

      let interesting = "";
      if (b.type === "EnvironmentVariableDataBlock") {
        interesting = (b.parsed?.targetUnicode || b.parsed?.targetAnsi || "").slice(0,120);
      } else if (b.type === "TrackerDataBlock") {
        const machinePart = `MachineID=${b.parsed?.machineID || ""}`;
        const macs = Array.isArray(b.parsed?.macAddresses) ? b.parsed.macAddresses : [];
        const macPart = macs.length ? ` | MAC=${macs.join(", ")}` : "";
        interesting = `${machinePart}${macPart}`.trim();
      } else if (b.type === "KnownFolderDataBlock") {
        interesting = (b.parsed?.knownFolderName || b.parsed?.knownFolderID || "").slice(0,120);
      } else if (b.type === "PropertyStoreDataBlock") {
        interesting = (b.parsed?.stringsHintUtf16le?.[0] || "").slice(0,120);
      } else if (b.carvedUtf16?.length) {
        interesting = b.carvedUtf16[0].slice(0,120);
      }

      const blockCell = el("td", {class:"mono"}, [
        clickableText(`#${i}`, "Jump and highlight the full block", () => jumpToRange(b.start, size, `ExtraData #${i}`))
      ]);
      const typeCell = el("td", {class:"mono"}, [
        clickableText(b.type || "Unknown", "Jump and highlight the full block", () => jumpToRange(b.start, size, `ExtraData #${i}`))
      ]);
      const startCell = el("td", {class:"mono"}, [
        clickableText(hex(b.start), "Jump and highlight the full block", () => jumpToRange(b.start, size, `ExtraData #${i}`))
      ]);

      tb.appendChild(el("tr", {}, [
        blockCell,
        typeCell,
        startCell,
        el("td", {class:"mono"}, [String(b.size ?? size)]),
        el("td", {class:"mono"}, [interesting || ""])
      ]));
    }

    t.appendChild(tb);
    return t;
  }

  function renderExtraBlockDetails(blocks) {
    const wrap = el("div");
    if (!blocks?.length) return el("div",{class:"muted small"},["No ExtraData blocks."]);

    for (let i=0;i<blocks.length;i++) {
      const b = blocks[i];
      const d = el("details", {class:"subsection-card"});
      const sum = el("summary", {}, [
        `ExtraData #${i} `,
        el("span",{class:"badge mono small", style:"margin-left:8px"},[b.type || "Unknown"]),
        el("span",{class:"muted small", style:"margin-left:8px"},[`@ ${hex(b.start)} size ${b.size ?? (b.end-b.start)}`]),
      ]);
      d.appendChild(sum);

      const content = el("div");
      const meta = b.meta || {};

      const meta2 = { ...meta };
      if (meta2._block && Number.isFinite(meta2._block.absOff) && Number.isFinite(meta2._block.len)) {
        meta2.type = meta2._block;
        meta2.signature = meta2._block;
        meta2.blockSize = meta2._block;
        meta2.start = meta2._block;
        meta2.end = meta2._block;
      }

      if (b.type === "TrackerDataBlock") {
        content.appendChild(renderTrackerDataBlock(b));
      } else {
        const data = {
          type: b.type,
          signature: b.signature,
          blockSize: b.size,
          start: hex(b.start),
          end: hex(b.end),
          ...(b.parsed ? b.parsed : {})
        };

        content.appendChild(renderKV(data, { meta: meta2, enableStringSearch: true }));
      }

      if (b.notes?.length) content.appendChild(el("div",{class:"warn"},[
        el("div",{html:"<strong>Notes</strong>"}),
        el("ul",{}, b.notes.map(x=>el("li",{},[x])))
      ]));

      if (b.carvedUtf16?.length) {
        content.appendChild(el("div",{class:"small muted", style:"margin-top:8px"},["Heuristic UTF-16LE strings found in this block:"]));
        const ul = el("ul", {class:"small"});
        for (const s of b.carvedUtf16) {
          ul.appendChild(el("li", {class:"mono"}, [
            clickableText(s, "Search (ASCII + UTF-16LE) and jump near first match", () => jumpToValueSearch(s))
          ]));
        }
        content.appendChild(ul);
      }

      d.appendChild(content);
      wrap.appendChild(d);
    }
    return wrap;
  }

  // Global listeners installed once (prevents stacking on re-render)
  let __hexGlobalListenersInstalled = false;

  function render(parsed) {
    document.querySelectorAll(".hx-tip").forEach(n => n.remove());
    document.querySelectorAll(".hx-menu").forEach(n => n.remove());

    $out.innerHTML = "";
    hexUI = null;

    const knownRanges = buildKnownRanges(parsed);

    // Hover tooltip
    const tip = el("div", { class: "hx-tip", style: "display:none;" });
    document.body.appendChild(tip);

    // Right-click menu 
    let menu = null;
    let menuOpen = false;

    function closeMenu() {
      if (menu) { menu.remove(); menu = null; }
      menuOpen = false;
    }

    function openMenu(x, y, items, titleText) {
      closeMenu();
      menuOpen = true;

      menu = el("div", { class: "hx-menu" });

      // Prevent interactions within the menu from bubbling up and closing it.
      menu.addEventListener("mousedown", (e) => { e.stopPropagation(); });
      menu.addEventListener("click", (e) => { e.stopPropagation(); });
      menu.addEventListener("contextmenu", (e) => { e.preventDefault(); e.stopPropagation(); });

      menu.appendChild(el("div", { class: "hint" }, [titleText]));

      for (const it of items) {
        if (it === "sep") {
          menu.appendChild(el("div", { class: "sep" }));
          continue;
        }
        const btn = el("button", {}, [it.label]);
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (it.label === "Cancel") { closeMenu(); return; }
          const ok = await copyTextToClipboard(it.getText());
          $status.textContent = ok ? `Copied: ${it.label}` : "Copy failed (clipboard blocked).";
          closeMenu();
        });
        menu.appendChild(btn);
      }

      document.body.appendChild(menu);

      const pad = 10;
      const r = menu.getBoundingClientRect();
      const nx = Math.min(window.innerWidth - r.width - pad, x);
      const ny = Math.min(window.innerHeight - r.height - pad, y);
      menu.style.left = Math.max(pad, nx) + "px";
      menu.style.top  = Math.max(pad, ny) + "px";
    }

    const overviewTracker = parsed.sections
      .find(s => s.name === "ExtraData")?.detail?.blocks
      ?.find(b => b.type === "TrackerDataBlock") || null;
    const overviewMachine = parsed.dfir?.extracted?.extra_machineID || null;
    const overviewMacs = Array.isArray(parsed.dfir?.extracted?.extra_macAddresses)
      ? parsed.dfir.extracted.extra_macAddresses
      : [];
    const overviewTarget = parsed.dfir?.derived?.bestTargetPath || null;
    const overviewTargetSource = parsed.dfir?.derived?.targetSource || null;
    const overviewTargetResolution = parsed.dfir?.derived?.targetResolution || null;
    const overviewEnvBlock = parsed.sections
      .find(s => s.name === "ExtraData")?.detail?.blocks
      ?.find(b => b.type === "EnvironmentVariableDataBlock") || null;
    const overviewTargetIsEnvironment = typeof overviewTargetSource === "string" && overviewTargetSource.startsWith("EnvironmentVariableDataBlock");
    const overviewTargetMeta = overviewTargetIsEnvironment
      ? (overviewEnvBlock?.parsed?.targetUnicode
          ? overviewEnvBlock?.meta?.targetUnicode
          : overviewEnvBlock?.meta?.targetAnsi)
      : null;
    const overviewMachineMeta = overviewTracker?.meta?.machineID || null;
    const overviewFirstMacSource = overviewTracker?.parsed?.macAddressDetails?.[0]?.sources?.[0] || null;
    const overviewFirstMacMetaKey = trackerSourceNodeMetaKey(overviewFirstMacSource);
    const overviewFirstMacMeta = overviewFirstMacMetaKey ? overviewTracker?.meta?.[overviewFirstMacMetaKey] : null;

    const overview = el("section", {class:"overview-grid", "aria-label":"Shortcut overview"});

    const targetValue = el("div", {class:"overview-value mono"});
    if (overviewTarget) {
      if (overviewTargetMeta && Number.isFinite(overviewTargetMeta.absOff) && Number.isFinite(overviewTargetMeta.len)) {
        targetValue.appendChild(clickableText(

          "Jump to the EnvironmentVariableDataBlock target bytes",
          () => jumpToRange(overviewTargetMeta.absOff, overviewTargetMeta.len, "Environment target")
        ));
      } else {
        targetValue.appendChild(clickableText(
          overviewTarget,

        ));

    } else {
      targetValue.appendChild(document.createTextNode(overviewTargetResolution || "Target not resolved"));

    const targetMetaText = overviewTarget

      : (overviewTargetResolution || "No target path was derived from the parsed structures");
    overview.appendChild(el("div", {class:"overview-card wide"}, [
      el("div", {class:"overview-label"}, ["Best target candidate"]),

    if (overviewMachine && overviewMachineMeta) {
      identityValue.appendChild(clickableText(
