<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LNK Viewer</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0f14;
      --bg-elevated: #101720;
      --panel: rgba(20, 29, 40, .88);
      --panel-solid: #141d28;
      --panel-soft: rgba(255, 255, 255, .035);
      --panel-hover: rgba(255, 255, 255, .055);
      --text: #e8eef5;
      --text-strong: #ffffff;
      --muted-text: #94a3b4;
      --accent: #35d399;
      --accent-strong: #15b87f;
      --accent-soft: rgba(53, 211, 153, .12);
      --blue: #67b7ff;
      --blue-soft: rgba(103, 183, 255, .12);
      --warn: #f4bd50;
      --warn-soft: rgba(244, 189, 80, .12);
      --bad: #ff6b79;
      --bad-soft: rgba(255, 107, 121, .12);
      --border: rgba(148, 163, 184, .18);
      --border-strong: rgba(148, 163, 184, .3);
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, .18);
      --radius-lg: 18px;
      --radius-md: 13px;
      --radius-sm: 9px;

      /* Hex view: retain exact virtual-row geometry. */
      --hx-bg: #080c11;
      --hx-frame: rgba(255,255,255,.10);
      --hx-off: #8497aa;
      --hx-hex: #e6edf3;
      --hx-ascii: #d7e1ea;
      --hx-null: #617284;
      --hx-print: #79c3ff;
      --hx-path: #8cffc8;
      --hx-hi-bg: rgba(255, 208, 0, .20);
      --hx-hi-outline: rgba(255, 208, 0, .45);
      --hx-sel-bg: rgba(0, 200, 255, .20);
      --hx-sel-outline: rgba(0, 200, 255, .55);
      --hx-hov-bg: rgba(180, 80, 255, .18);
      --hx-hov-outline: rgba(180, 80, 255, .55);
      --hx-dim: #566779;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f3f6f9;
        --bg-elevated: #ffffff;
        --panel: rgba(255,255,255,.92);
        --panel-solid: #ffffff;
        --panel-soft: rgba(15, 23, 42, .035);
        --panel-hover: rgba(15, 23, 42, .055);
        --text: #17202b;
        --text-strong: #08111c;
        --muted-text: #607083;
        --accent: #078c61;
        --accent-strong: #05734f;
        --accent-soft: rgba(7, 140, 97, .10);
        --blue: #1769aa;
        --blue-soft: rgba(23, 105, 170, .10);
        --warn: #9a6200;
        --warn-soft: rgba(184, 113, 0, .10);
        --bad: #c93647;
        --bad-soft: rgba(201, 54, 71, .10);
        --border: rgba(51, 65, 85, .14);
        --border-strong: rgba(51, 65, 85, .24);
        --shadow: 0 18px 48px rgba(36, 48, 66, .12);
        --shadow-soft: 0 7px 20px rgba(36, 48, 66, .08);
      }
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, rgba(53, 211, 153, .12), transparent 28rem),
        radial-gradient(circle at 92% 0%, rgba(103, 183, 255, .10), transparent 24rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;
      line-height: 1.5;
    }

    button, input { font: inherit; }
    button, input, summary { -webkit-tap-highlight-color: transparent; }
    ::selection { background: rgba(53, 211, 153, .28); }

    .app-shell {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(53, 211, 153, .32);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(53, 211, 153, .20), rgba(103, 183, 255, .10));
      box-shadow: inset 0 1px rgba(255,255,255,.12), var(--shadow-soft);
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 850;
      letter-spacing: -.08em;
    }
    .brand-copy { min-width: 0; }
    h1 { margin: 0; color: var(--text-strong); font-size: clamp(22px, 2.3vw, 30px); line-height: 1.1; letter-spacing: -.035em; }
    .brand-subtitle { margin-top: 5px; color: var(--muted-text); font-size: 13px; }
    .header-badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted-text);
      font-size: 12px;
      font-weight: 700;
    }
    .security-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

    .ingest-panel {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 0 0 14px; }
    .file-picker {
      min-width: min(100%, 420px);
      flex: 1 1 420px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 5px 12px 5px 5px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-soft);
      cursor: pointer;
      overflow: hidden;
    }
    .file-picker:hover { border-color: var(--border-strong); background: var(--panel-hover); }
    .file-picker input { position: absolute; inline-size: 1px; block-size: 1px; opacity: 0; pointer-events: none; }
    .file-picker-button {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 9px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }
    .file-name-hint { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted-text); font-size: 13px; }
    .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      background: var(--panel-soft);
      cursor: pointer;
      font-weight: 720;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, opacity .16s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); border-color: var(--border-strong); background: var(--panel-hover); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:focus-visible, input:focus-visible, summary:focus-visible, .clickable:focus-visible { outline: 3px solid rgba(103, 183, 255, .28); outline-offset: 2px; }
    button:disabled { opacity: .42; cursor: not-allowed; }
    .action-buttons button:first-child:not(:disabled) { color: var(--accent); border-color: rgba(53, 211, 153, .28); background: var(--accent-soft); }

    .drop {
      min-height: 112px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px;
      border: 1px dashed var(--border-strong);
      border-radius: 14px;
      background: linear-gradient(135deg, var(--panel-soft), transparent);
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }
    .drop.drag { border-color: var(--accent); background: var(--accent-soft); transform: scale(.998); }
    .drop-title { display: flex; align-items: center; gap: 10px; color: var(--text-strong); font-weight: 800; }
    .drop-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; color: var(--accent); background: var(--accent-soft); font-size: 18px; }
    .drop-copy { margin-top: 4px; color: var(--muted-text); font-size: 12px; }
    .status-chip {
      max-width: 48%;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-elevated);
      color: var(--muted-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .alerts-stack { display: grid; gap: 10px; margin: 16px 0; }
    .warn, .ok, .bad {
      margin: 0;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 11px;
      box-shadow: var(--shadow-soft);
    }
    .warn { border-left-color: var(--warn); background: var(--warn-soft); }
    .ok { border-left-color: var(--accent); background: var(--accent-soft); }
    .bad { border-left-color: var(--bad); background: var(--bad-soft); }

    #out { display: grid; gap: 12px; }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 4px;
    }
    .overview-card {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
    }
    .overview-card.wide { grid-column: span 2; }
    .overview-label { margin-bottom: 8px; color: var(--muted-text); font-size: 11px; font-weight: 850; letter-spacing: .09em; text-transform: uppercase; }
    .overview-value { color: var(--text-strong); font-size: 15px; font-weight: 780; line-height: 1.35; overflow-wrap: anywhere; }
    .overview-value.mono { font-size: 13px; }
    .overview-meta { margin-top: 6px; color: var(--muted-text); font-size: 12px; }
    .overview-state { display: inline-flex; align-items: center; gap: 7px; }
    .overview-state::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .overview-state.warn-state::before { background: var(--warn); }
    .overview-state.bad-state::before { background: var(--bad); }

    details {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      overflow: clip;
    }
    details[open] { border-color: var(--border-strong); }
    summary {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 14px 48px 14px 16px;
      cursor: pointer;
      list-style: none;
      color: var(--text-strong);
      font-weight: 780;
      background: transparent;
      transition: background .16s ease;
    }
    summary::-webkit-details-marker { display: none; }
    summary:hover { background: var(--panel-hover); }
    summary::after {
      content: "";
      position: absolute;
      right: 18px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted-text);
      border-bottom: 2px solid var(--muted-text);
      transform: rotate(45deg) translateY(-2px);
      transition: transform .18s ease;
    }
    details[open] > summary { border-bottom: 1px solid var(--border); background: var(--panel-soft); }
    details[open] > summary::after { transform: rotate(225deg) translate(-2px, -2px); }
    .section-summary-copy { min-width: 0; display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
    .section-title { font-size: 14px; }
    .section-subtitle { color: var(--muted-text); font-size: 12px; font-weight: 500; }
    .section-body { padding: 16px; }
    .section-body > :first-child { margin-top: 0 !important; }

    h2 { color: var(--text-strong); letter-spacing: -.015em; }
    .muted { color: var(--muted-text); opacity: 1; }
    .small { font-size: 12px; }
    .mono, code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    code { padding: .12em .34em; border: 1px solid var(--border); border-radius: 5px; background: var(--panel-soft); }
    pre { padding: 12px; border: 1px solid var(--border); border-radius: 11px; background: var(--panel-soft); overflow: auto; }

    .grid {
      display: grid;
      grid-template-columns: minmax(170px, 245px) minmax(0, 1fr);
      gap: 0;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
    }
    .grid > div { min-width: 0; padding: 9px 11px; border-bottom: 1px solid var(--border); }
    .grid > div:nth-last-child(-n+2) { border-bottom: 0; }
    .grid .k { color: var(--muted-text); background: var(--panel-soft); font-size: 12px; font-weight: 720; }
    .grid .v { overflow-wrap: anywhere; }

    .twoCol { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .twoCol > div { min-width: 0; }

    .pill, .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      margin: 3px 5px 3px 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted-text);
    }
    .pill { color: var(--blue); border-color: rgba(103, 183, 255, .22); background: var(--blue-soft); }

    .clickable {
      color: var(--blue);
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
      text-underline-offset: 3px;
      transition: color .16s ease, background .16s ease;
    }
    .clickable:hover { color: var(--accent); background: var(--accent-soft); }

    table { width: 100%; margin-top: 10px; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border); border-radius: 11px; overflow: hidden; }
    th, td { padding: 8px 10px; text-align: left; vertical-align: top; border: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    th:last-child, td:last-child { border-right: 0; }
    tbody tr:last-child td { border-bottom: 0; }
    th { color: var(--muted-text); background: var(--panel-soft); font-size: 11px; font-weight: 850; letter-spacing: .055em; text-transform: uppercase; }
    tbody tr { transition: background .14s ease; }
    tbody tr:hover { background: var(--panel-hover); }

    input[type="search"] {
      min-width: min(100%, 340px);
      min-height: 40px;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      background: var(--bg-elevated);
    }
    input[type="search"]::placeholder { color: var(--muted-text); }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: -4px -4px 12px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel-solid) 92%, transparent);
      backdrop-filter: blur(14px);
    }
    .toolbar input[type="search"] { flex: 1 1 300px; }
    .toggle { display: inline-flex; align-items: center; gap: 8px; min-height: 38px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel-soft); }
    .toggle input { accent-color: var(--accent); transform: scale(1.05); }

    /* Coloured and virtualised hex view. */
    .hex {
      min-width: max-content;
      padding: 12px;
      border: 1px solid var(--hx-frame);
      border-radius: 12px;
      color: var(--hx-hex);
      background: var(--hx-bg);
      box-shadow: inset 0 12px 34px rgba(0,0,0,.28);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre;
      user-select: none;
      overflow: visible;
    }
    #hexBox {
      position: relative;
      max-height: 70vh;
      min-height: 300px;
      padding: 4px;
      overflow: auto;
      overflow-anchor: none;
      border-radius: 13px;
      background: #080c11;
      scrollbar-color: #344454 #0d131a;
      scrollbar-width: thin;
    }
    #hexBox::-webkit-scrollbar { width: 11px; height: 11px; }
    #hexBox::-webkit-scrollbar-track { background: #0d131a; border-radius: 999px; }
    #hexBox::-webkit-scrollbar-thumb { background: #344454; border: 3px solid #0d131a; border-radius: 999px; }
    #hexBox::-webkit-scrollbar-thumb:hover { background: #465b6f; }
    .hx-line { display: block; height: 18px; line-height: 18px; }
    .hx-virtual-canvas { position: relative; display: block; min-width: 82ch; overflow-anchor: none; }
    .hx-virtual-rows { position: absolute; top: 0; left: 0; display: block; width: max-content; min-width: 82ch; will-change: transform; overflow-anchor: none; }
    .hx-off { display: inline-block; width: 9ch; color: var(--hx-off); }
    .hx-gap { display: inline-block; width: 2ch; }
    .hx-hex { display: inline-block; width: 49ch; color: var(--hx-hex); }
    .hx-ascii { color: var(--hx-ascii); }
    .hx-b { display: inline-block; width: 2ch; text-align: center; font-weight: 600; }
    .hx-b.null { color: var(--hx-null); font-weight: 500; }
    .hx-b.print { color: var(--hx-print); }
    .hx-b.path { color: var(--hx-path); }
    .hx-b.hit { background: var(--hx-hi-bg); outline: 1px solid var(--hx-hi-outline); border-radius: 4px; }
    .hx-b.hov { background: var(--hx-hov-bg); outline: 1px solid var(--hx-hov-outline); border-radius: 4px; }
    .hx-b.sel { background: var(--hx-sel-bg); outline: 1px solid var(--hx-sel-outline); border-radius: 4px; }
    .hx-b.anchor { outline: 2px solid rgba(255,255,255,.35); border-radius: 4px; }
    .hx-a { display: inline-block; width: 1ch; text-align: center; }
    .hx-a.dim { color: var(--hx-dim); }
    .hx-a.hit { background: var(--hx-hi-bg); outline: 1px solid var(--hx-hi-outline); border-radius: 4px; }
    .hx-a.hov { background: var(--hx-hov-bg); outline: 1px solid var(--hx-hov-outline); border-radius: 4px; }
    .hx-a.sel { background: var(--hx-sel-bg); outline: 1px solid var(--hx-sel-outline); border-radius: 4px; }

    /* TrackerDataBlock machine identity presentation. */
    .tracker-card { margin-top: 12px; border: 1px solid var(--border); border-radius: 13px; overflow: hidden; background: var(--panel-soft); }
    .tracker-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 12px 14px; border-bottom: 1px solid var(--border); background: linear-gradient(90deg, var(--accent-soft), transparent); }
    .tracker-card-title { color: var(--text-strong); font-weight: 800; }
    .tracker-identity-grid { display: grid; grid-template-columns: 150px minmax(0, 1fr); gap: 0; }
    .tracker-identity-grid > div { padding: 11px 13px; border-bottom: 1px solid var(--border); }
    .tracker-identity-grid > div:nth-last-child(-n+2) { border-bottom: 0; }
    .tracker-label { color: var(--muted-text); font-size: 11px; font-weight: 800; letter-spacing: .055em; text-transform: uppercase; }
    .tracker-machine { color: var(--text-strong); font-size: 15px; font-weight: 760; overflow-wrap: anywhere; }
    .tracker-mac-list { display: flex; flex-direction: column; gap: 8px; }
    .tracker-mac-entry { padding: 9px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel-solid); }
    .tracker-mac-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tracker-mac-address { color: var(--accent); font-size: 15px; font-weight: 850; letter-spacing: .045em; }
    .tracker-source { margin-top: 4px; color: var(--muted-text); font-size: 12px; overflow-wrap: anywhere; }
    .tracker-source-link { display: inline-block; margin: 2px 4px 0 0; }
    .tracker-provenance { margin: 10px 0 0; border-radius: 10px; box-shadow: none; }
    .tracker-provenance table { margin-top: 8px; }
    .tracker-guid { overflow-wrap: anywhere; }

    .hx-tip { position: fixed; z-index: 9999; pointer-events: none; max-width: 560px; padding: 7px 9px; border: 1px solid rgba(255,255,255,.15); border-radius: 10px; background: rgba(8,12,17,.94); color: #e6edf3; box-shadow: 0 12px 30px rgba(0,0,0,.35); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; line-height: 1.35; white-space: pre-wrap; }
    .hx-menu { position: fixed; z-index: 10000; min-width: 230px; padding: 6px; border: 1px solid rgba(255,255,255,.15); border-radius: 12px; background: rgba(8,12,17,.97); color: #e6edf3; box-shadow: 0 18px 44px rgba(0,0,0,.48); }
    .hx-menu button { width: 100%; min-height: 0; padding: 8px 10px; border: 0; border-radius: 9px; color: inherit; background: transparent; text-align: left; }
    .hx-menu button:hover { transform: none; background: rgba(255,255,255,.08); }
    .hx-menu .sep { height: 1px; margin: 6px 4px; background: rgba(255,255,255,.10); }
    .hx-menu .hint { padding: 6px 10px; color: #aab8c6; font-size: 12px; }

    .section-body > details,
    .section-body .subsection-card,
    .tracker-provenance { box-shadow: none; background: var(--panel-soft); }
    .section-body > details + details { margin-top: 10px; }
    .section-body > details > summary { min-height: 50px; padding-top: 11px; padding-bottom: 11px; }
    .section-body > details > :not(summary) { padding-left: 13px; padding-right: 13px; }

    .app-footer { margin-top: 18px; padding: 12px 2px; color: var(--muted-text); font-size: 11px; text-align: center; }

    @media (max-width: 1050px) {
      .overview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .overview-card.wide { grid-column: span 2; }
    }
    @media (max-width: 900px) {
      .twoCol { grid-template-columns: 1fr; }

    const ft = (BigInt(ftHigh) << 32n) | BigInt(ftLow >>> 0);
    if (ft === 0n) return null;
    const EPOCH_DIFF_100NS = 116444736000000000n;
    const ms = Number((ft - EPOCH_DIFF_100NS) / 10000n);
    if (!Number.isFinite(ms)) return null;
    return new Date(ms).toISOString();
  }

  function readGuid(u8, off) {
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
    const d1 = dv.getUint32(off, true);
    const d2 = dv.getUint16(off+4, true);
    const d3 = dv.getUint16(off+6, true);
    const b = [];
    for (let i=0;i<8;i++) b.push(u8[off+8+i]);
    const s4 = b.slice(0,2).map(x=>x.toString(16).padStart(2,"0")).join("");
    const s5 = b.slice(2).map(x=>x.toString(16).padStart(2,"0")).join("");
    return `${d1.toString(16).padStart(8,"0")}-${d2.toString(16).padStart(4,"0")}-${d3.toString(16).padStart(4,"0")}-${s4}-${s5}`.toLowerCase();
  }

  // UUID version 1 GUIDs can contain a 48-bit node identifier. When the
  // multicast bit is clear, that node is a MAC-address candidate. If the bit
  // is set, RFC-compatible generators use a synthetic/random node instead.
  function analyseUuidNode(guid, source) {
    const m = String(guid || "").toLowerCase().match(
      /^([0-9a-f]{8})-([0-9a-f]{4})-([0-9a-f]{4})-([0-9a-f]{4})-([0-9a-f]{12})$/
    );
    if (!m) return null;

    const uuidVersion = parseInt(m[3][0], 16);
    const clockSeqHigh = parseInt(m[4].slice(0, 2), 16);
    const isRfc4122Variant = (clockSeqHigh & 0xC0) === 0x80;
    const nodeHex = m[5];
    const nodeFirstOctet = parseInt(nodeHex.slice(0, 2), 16);
    const isMulticastNode = (nodeFirstOctet & 0x01) !== 0;
    const isLocallyAdministered = (nodeFirstOctet & 0x02) !== 0;
    const node = nodeHex.match(/../g).join(":").toUpperCase();
    const isMacAddressCandidate = uuidVersion === 1 && isRfc4122Variant && !isMulticastNode;

    return {
      source,
      guid,
      uuidVersion,
      isRfc4122Variant,
      node,
      isMulticastNode,
      isLocallyAdministered,
      isMacAddressCandidate
    };
  }

  function extractTrackerMacInfo(droid, droidBirth) {
    const guidEntries = [
      ...droid.map((guid, index) => ({ guid, source: `DROID[${index}]` })),
      ...droidBirth.map((guid, index) => ({ guid, source: `DROIDBirth[${index}]` }))
    ];

    const uuidV1Nodes = guidEntries
      .map(({ guid, source }) => analyseUuidNode(guid, source))
      .filter(info => info && info.uuidVersion === 1 && info.isRfc4122Variant);

    const byAddress = new Map();
    for (const info of uuidV1Nodes) {
      if (!info.isMacAddressCandidate) continue;
      let entry = byAddress.get(info.node);
      if (!entry) {
        entry = {
          address: info.node,
          administration: info.isLocallyAdministered ? "locally administered" : "globally administered",
          sources: [],
          guids: []
        };
        byAddress.set(info.node, entry);
      }
      if (!entry.sources.includes(info.source)) entry.sources.push(info.source);
      if (!entry.guids.includes(info.guid)) entry.guids.push(info.guid);
    }

    return {
      macAddresses: [...byAddress.keys()],
      macAddressDetails: [...byAddress.values()],
      uuidV1Nodes
    };
  }

    const bytes = u8.slice(off, off+len);
    let end = bytes.indexOf(0);

    const stop = Math.min(hardEnd, u8.length);

    const s = new TextDecoder("windows-1252", {fatal:false}).decode(bytes);
    return { value: s, next: Math.min(i+1, stop) };
  }

    let i = off;
    while (i < stop && u8[i] !== 0) i++;

    return { absOff: off, len: Math.max(0, len) };

  // ---------- Copy format helpers ----------
  function bytesToHex(u8, startAbs, endAbs) {

  function bytesToAscii(u8, startAbs, endAbs) {
